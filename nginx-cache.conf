# Wildfire Wiki - Nginx cache headers for static assets
# Include this inside your server {} block:
#   include /var/www/wiki/nginx-cache.conf;

# Hashed assets (JS/CSS with content hash in filename) - cache forever
location ~* ^/assets/.*\.(js|css)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# Static chunks (also hashed)
location ~* ^/chunks/.*\.(js|css)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# Images and SVGs - 7 day cache
location ~* \.(webp|png|jpg|jpeg|gif|svg|ico|woff2|woff|ttf|eot)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    access_log off;
}

# HTML pages - always revalidate so deploys take effect immediately
location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
}
