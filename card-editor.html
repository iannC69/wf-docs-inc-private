<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wildfire • Card Editor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      background: #0a0a0a;
      min-height: 100vh;
      padding: 30px;
      color: #fff;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .header {
      background: #0f0f0f;
      border: 1px solid #ff4500;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    h1 svg {
      width: 32px;
      height: 32px;
      stroke: #ff4500;
      fill: none;
    }
    
    .stats {
      display: flex;
      gap: 15px;
    }
    
    .stat {
      background: #1a1a1a;
      border: 1px solid #ff4500;
      border-radius: 30px;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .stat svg {
      width: 18px;
      height: 18px;
      stroke: #ff4500;
    }
    
    .stat-value {
      color: #ff4500;
      font-weight: 700;
      font-size: 20px;
    }
    
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 25px;
    }
    
    .slot-card {
      background: #0f0f0f;
      border: 1px solid #ff4500;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    
    .slot-card:hover {
      transform: translateY(-2px);
      border-color: #ffd700;
      box-shadow: 0 8px 16px -8px #ff4500;
    }
    
    .slot-card.selected {
      border-color: #ffd700;
      box-shadow: 0 0 0 2px #ffd700;
    }
    
    .slot-number {
      font-size: 24px;
      font-weight: 800;
      color: #ff4500;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .slot-number svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
    }
    
    .slot-status {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .slot-status svg {
      width: 12px;
      height: 12px;
    }
    
    .slot-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .slot-category {
      font-size: 11px;
      color: #ff4500;
    }
    
    .preview-section {
      background: #0f0f0f;
      border: 1px solid #ff4500;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 25px;
    }
    
    .preview-title {
      font-size: 16px;
      font-weight: 600;
      color: #ffd700;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .preview-title svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
    }
    
    .preview-card {
      background: #0a0a0a;
      border-radius: 14px;
      padding: 16px;
      max-width: 350px;
      margin: 0 auto;
      border: 1px solid #ff4500;
    }
    
    .preview-category {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    
    .preview-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .preview-cat-name {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #9ca3af;
    }
    
    .preview-card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: white;
    }
    
    .preview-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ff4500;
      font-size: 11px;
    }
    
    .preview-date {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .preview-date svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
    }
    
    .preview-user {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .preview-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #ff4500;
    }
    
    .preview-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .preview-tags {
      display: flex;
      gap: 6px;
    }
    
    .preview-tag {
      padding: 3px 10px;
      font-size: 9px;
      font-weight: 600;
      border-radius: 30px;
      border: 1px solid;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .preview-tag svg {
      width: 10px;
      height: 10px;
      stroke: currentColor;
    }
    
    .preview-btn {
      padding: 4px 12px;
      border-radius: 30px;
      background: rgba(255,69,0,0.1);
      color: #ff4500;
      font-size: 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .preview-btn svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
    }
    
    .editor {
      background: #0f0f0f;
      border: 1px solid #ff4500;
      border-radius: 16px;
      padding: 25px;
    }
    
    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    
    .editor-title {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .editor-title svg {
      width: 24px;
      height: 24px;
      stroke: #ffd700;
    }
    
    .editor-title span {
      color: #ffd700;
    }
    
    .copy-tools {
      display: flex;
      gap: 8px;
    }
    
    .copy-btn {
      background: #1a1a1a;
      border: 1px solid #ff4500;
      border-radius: 20px;
      padding: 6px 14px;
      color: white;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .copy-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
    }
    
    .copy-btn:hover {
      background: #ff4500;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
      color: #9ca3af;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    label svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
    }
    
    input, select {
      width: 100%;
      padding: 10px 14px;
      background: #1a1a1a;
      border: 1px solid #ff4500;
      border-radius: 10px;
      color: white;
      font-size: 14px;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #ffd700;
    }
    
    .color-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    
    .color-opt {
      background: #1a1a1a;
      border: 1px solid #ff4500;
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    
    .color-opt svg {
      width: 12px;
      height: 12px;
    }
    
    .color-opt:hover {
      border-color: #ffd700;
    }
    
    .color-opt.selected {
      background: rgba(255,69,0,0.2);
      border-color: #ffd700;
    }
    
    .copy-panel {
      background: #1a1a1a;
      border: 1px dashed #ff4500;
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
      display: none;
    }
    
    .copy-panel.active {
      display: block;
    }
    
    .slot-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0;
    }
    
    .slot-option {
      background: #0f0f0f;
      border: 1px solid #ff4500;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .slot-option svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
    }
    
    .slot-option.selected {
      background: rgba(255,69,0,0.3);
      border-color: #ffd700;
    }
    
    .action-btns {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
    }
    
    .btn-reset {
      background: #1a1a1a;
      border: 1px solid #ff4500;
      color: white;
    }
    
    .btn-reset:hover {
      background: #2a2a2a;
    }
    
    .btn-save {
      background: linear-gradient(135deg, #ff4500, #ff8c00);
      color: white;
    }
    
    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255,69,0,0.3);
    }
    
    .status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      display: none;
    }
    
    .status.success {
      display: block;
      background: rgba(16,185,129,0.2);
      color: #10b981;
      border: 1px solid #10b981;
    }
    
    .status.error {
      display: block;
      background: rgba(239,68,68,0.2);
      color: #ef4444;
      border: 1px solid #ef4444;
    }
    
    @media (max-width: 1024px) {
      .slot-grid { grid-template-columns: repeat(2, 1fr); }
    }
    
    @media (max-width: 768px) {
      .slot-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .action-btns { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        WILDFIRE CARD EDITOR
      </h1>
      <div class="stats">
        <div class="stat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span class="stat-value" id="total">6</span> Total
        </div>
        <div class="stat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          <span class="stat-value" id="active">0</span> Active
        </div>
        <div class="stat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span class="stat-value" id="current">1</span> Curent
        </div>
      </div>
    </div>
    
    <div class="slot-grid" id="slotGrid"></div>
    
    <div class="preview-section">
      <div class="preview-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <circle cx="12" cy="16" r="1" fill="currentColor"/>
        </svg>
        PREVIEW CARD
      </div>
      <div id="previewCard" class="preview-card">
        <div class="preview-category">
          <span class="preview-dot" id="previewDot" style="background: #ff4500;"></span>
          <span class="preview-cat-name" id="previewCategory">Categorie</span>
        </div>
        <div class="preview-card-title" id="previewTitle">Titlu card</div>
        <div class="preview-meta">
          <span class="preview-date" id="previewDate">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            zz.ll.aaaa
          </span>
          <div class="preview-user">
            <img src="" class="preview-avatar" id="previewAvatar" onerror="this.src='https://github.com/identicons/default.png'">
            <span id="previewUser">user</span>
          </div>
        </div>
        <div class="preview-footer">
          <div class="preview-tags">
            <span class="preview-tag" id="previewTag1">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="6"/>
              </svg>
              tag1
            </span>
            <span class="preview-tag" id="previewTag2">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="6"/>
              </svg>
              tag2
            </span>
          </div>
          <span class="preview-btn" id="previewBtn">
            vezi
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </span>
        </div>
      </div>
    </div>
    
    <div class="editor">
      <div class="editor-header">
        <div class="editor-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M20 14.66V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5.34"/>
            <polygon points="18 2 22 6 12 16 8 16 8 12 18 2"/>
          </svg>
          Editează <span id="currentSlot">Slot 1</span>
        </div>
        <div class="copy-tools">
          <button class="copy-btn" onclick="showCopyPanel()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copiază
          </button>
          <button class="copy-btn" onclick="showPastePanel()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/>
              <path d="M14 2v6h6M12 18v-4M9 16h6"/>
            </svg>
            Paste
          </button>
        </div>
      </div>
      
      <div id="copyPanel" class="copy-panel">
        <h4 style="margin-bottom:10px;">Copiază în:</h4>
        <div class="slot-selector" id="copySlots"></div>
        <button class="btn btn-save" style="margin-top:10px;" onclick="executeCopy()">Confirmă copiere</button>
      </div>
      
      <div id="pastePanel" class="copy-panel">
        <h4 style="margin-bottom:10px;">Paste din:</h4>
        <div class="slot-selector" id="pasteSlots"></div>
        <button class="btn btn-save" style="margin-top:10px;" onclick="executePaste()">Confirmă paste</button>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            Status
          </label>
          <select id="activeSel" onchange="updatePreview()">
            <option value="true">✅ ACTIV</option>
            <option value="false">❌ INACTIV</option>
          </select>
        </div>
        <div class="form-group">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <circle cx="12" cy="12" r="10"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            Culoare
          </label>
          <div id="colorGrid" class="color-grid"></div>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M4 4h16v16H4z"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
            </svg>
            Categorie
          </label>
          <input id="cat" oninput="updatePreview()" placeholder="PANEL">
        </div>
        <div class="form-group">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M4 4h16v6H4zM4 14h16v6H4z"/>
            </svg>
            Titlu
          </label>
          <input id="title" oninput="updatePreview()" placeholder="DASHBOARD">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            Data
          </label>
          <input id="date" oninput="updatePreview()" placeholder="06.03.2026" value="22.03.2026">
        </div>
        <div class="form-group">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Username
          </label>
          <input id="user" oninput="updatePreview()" placeholder="WildFiire">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M7 7h10v10H7z"/>
              <path d="M17 7l4 4-4 4"/>
            </svg>
            Tag 1
          </label>
          <input id="tag1" oninput="updatePreview()" placeholder="NEW">
        </div>
        <div class="form-group">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M7 7h10v10H7z"/>
              <path d="M17 7l4 4-4 4"/>
            </svg>
            Tag 2
          </label>
          <input id="tag2" oninput="updatePreview()" placeholder="PANEL">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            Link
          </label>
          <input id="link" placeholder="/panel/panel">
        </div>
        <div class="form-group">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M4 7V4h16v3M4 7v9h16V7M4 7h16"/>
              <line x1="9" y1="20" x2="15" y2="20"/>
              <line x1="12" y1="16" x2="12" y2="20"/>
            </svg>
            Buton
          </label>
          <input id="btnText" oninput="updatePreview()" placeholder="ACUM">
        </div>
      </div>
      
      <div class="action-btns">
        <button class="btn btn-reset" onclick="resetForm()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          RESETEAZĂ
        </button>
        <button class="btn btn-save" onclick="saveCurrentSlot()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          SALVEAZĂ
        </button>
      </div>
      
      <div id="status" class="status"></div>
    </div>
  </div>
  
  <script>
    let cards = {}
    let colors = [{"id":"blue","name":"Albastru","dot":"dot-blue","tag":"blue","category":"INFORMATII","hex":"#3b82f6","emoji":"🔵"},{"id":"orange","name":"Portocaliu","dot":"dot-orange","tag":"orange","category":"PANEL","hex":"#f97316","emoji":"🟠"},{"id":"teal","name":"Turcoaz","dot":"dot-teal","tag":"teal","category":"GAMBLING","hex":"#14b8a6","emoji":"🟢"},{"id":"amber","name":"Galben","dot":"dot-amber","tag":"amber","category":"CURRENCY","hex":"#f59e0b","emoji":"🟡"},{"id":"purple","name":"Violet","dot":"dot-purple","tag":"purple","category":"CHANGELOGS","hex":"#8b5cf6","emoji":"🟣"},{"id":"pink","name":"Roz","dot":"dot-pink","tag":"pink","category":"NEWS","hex":"#ec4899","emoji":"🌸"},{"id":"red","name":"Roșu","dot":"dot-red","tag":"red","category":"ANTI-CHEAT","hex":"#ef4444","emoji":"🔴"},{"id":"green","name":"Verde","dot":"dot-green","tag":"green","category":"EVENIMENTE","hex":"#10b981","emoji":"🟢"}]
    let currentSlot = 1
    let selectedColor = 'blue'
    
    async function loadCards() {
      try {
        const res = await fetch('/api/cards')
        const data = await res.json()
        if (data.success) cards = data.cards
      } catch (e) {
        console.error('Error loading cards:', e)
      }
      updateUI()
    }
    
    function updateUI() {
      renderSlots()
      updateStats()
      renderColorOptions()
      loadSlot(currentSlot)
    }
    
    function renderSlots() {
      let html = ''
      for (let i = 1; i <= 6; i++) {
        const card = cards[`card${i}`] || { active: false, title: '', category: '' }
        html += `
          <div class="slot-card ${currentSlot === i ? 'selected' : ''}" onclick="selectSlot(${i})">
            <div class="slot-number">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="16"/>
                <line x1="8" y1="12" x2="16" y2="12"/>
              </svg>
              #${i}
            </div>
            <div class="slot-status">
              ${card.active ? 
                '<svg viewBox="0 0 24 24" fill="none" stroke="#10b981"><circle cx="12" cy="12" r="10"/><polyline points="9 12 12 15 16 9"/></svg> ACTIV' : 
                '<svg viewBox="0 0 24 24" fill="none" stroke="#ef4444"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> INACTIV'}
            </div>
            <div class="slot-title">${card.title || 'Card gol'}</div>
            <div class="slot-category">${card.category || ''}</div>
          </div>
        `
      }
      document.getElementById('slotGrid').innerHTML = html
    }
    
    function selectSlot(i) {
      currentSlot = i
      document.getElementById('current').innerText = i
      renderSlots()
      loadSlot(i)
    }
    
    function loadSlot(i) {
      const card = cards[`card${i}`] || {}
      document.getElementById('activeSel').value = card.active ? 'true' : 'false'
      document.getElementById('cat').value = card.category || ''
      document.getElementById('title').value = card.title || ''
      document.getElementById('date').value = card.date || '22.03.2026'
      document.getElementById('user').value = card.username || ''
      document.getElementById('tag1').value = card.tag1 || ''
      document.getElementById('tag2').value = card.tag2 || ''
      document.getElementById('link').value = card.link || ''
      document.getElementById('btnText').value = card.buttonText || ''
      
      document.getElementById('currentSlot').innerText = `Slot ${i}`
      
      if (card.dotClass) {
        const col = colors.find(c => c.dot === card.dotClass)
        if (col) selectedColor = col.id
      }
      renderColorOptions()
      updatePreview()
    }
    
    function updateStats() {
      let active = 0
      for (let i = 1; i <= 6; i++) {
        if (cards[`card${i}`]?.active) active++
      }
      document.getElementById('active').innerText = active
    }
    
    function renderColorOptions() {
      let html = ''
      colors.forEach(c => {
        const isSelected = c.id === selectedColor
        html += `
          <div class="color-opt ${isSelected ? 'selected' : ''}" onclick="selectColor('${c.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="${c.hex}">
              <circle cx="12" cy="12" r="10"/>
              ${isSelected ? '<circle cx="12" cy="12" r="3" fill="${c.hex}"/>' : ''}
            </svg>
            ${c.name}
          </div>
        `
      })
      document.getElementById('colorGrid').innerHTML = html
    }
    
    function selectColor(id) {
      selectedColor = id
      renderColorOptions()
      updatePreview()
    }
    
    function updatePreview() {
      const colorInfo = colors.find(c => c.id === selectedColor) || colors[0]
      document.getElementById('previewDot').style.background = colorInfo.hex
      document.getElementById('previewCategory').innerText = document.getElementById('cat').value || 'Categorie'
      document.getElementById('previewTitle').innerText = document.getElementById('title').value || 'Titlu card'
      document.getElementById('previewDate').innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        ${document.getElementById('date').value || 'zz.ll.aaaa'}
      `
      document.getElementById('previewUser').innerText = document.getElementById('user').value || 'user'
      document.getElementById('previewAvatar').src = `https://github.com/${document.getElementById('user').value || 'user'}.png`
      
      document.getElementById('previewTag1').innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="${colorInfo.hex}">
          <circle cx="12" cy="12" r="6"/>
        </svg>
        ${document.getElementById('tag1').value || 'tag1'}
      `
      document.getElementById('previewTag2').innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="${colorInfo.hex}">
          <circle cx="12" cy="12" r="6"/>
        </svg>
        ${document.getElementById('tag2').value || 'tag2'}
      `
      
      document.getElementById('previewTag1').style.color = colorInfo.hex
      document.getElementById('previewTag1').style.borderColor = colorInfo.hex
      document.getElementById('previewTag2').style.color = colorInfo.hex
      document.getElementById('previewTag2').style.borderColor = colorInfo.hex
      
      document.getElementById('previewBtn').innerHTML = `
        ${document.getElementById('btnText').value || 'vezi'}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      `
    }
    
    function resetForm() {
      document.getElementById('activeSel').value = 'false'
      document.getElementById('cat').value = ''
      document.getElementById('title').value = ''
      document.getElementById('date').value = '22.03.2026'
      document.getElementById('user').value = ''
      document.getElementById('tag1').value = ''
      document.getElementById('tag2').value = ''
      document.getElementById('link').value = ''
      document.getElementById('btnText').value = ''
      updatePreview()
    }
    
    function showCopyPanel() {
      document.getElementById('pastePanel').classList.remove('active')
      const panel = document.getElementById('copyPanel')
      panel.classList.toggle('active')
      if (panel.classList.contains('active')) {
        let html = ''
        for (let i = 1; i <= 6; i++) {
          if (i !== currentSlot) {
            html += `
              <div class="slot-option" onclick="toggleCopySlot(${i})" id="copySlot${i}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="8" x2="12" y2="16"/>
                  <line x1="8" y1="12" x2="16" y2="12"/>
                </svg>
                Slot ${i}
              </div>
            `
          }
        }
        document.getElementById('copySlots').innerHTML = html
      }
    }
    
    function showPastePanel() {
      document.getElementById('copyPanel').classList.remove('active')
      const panel = document.getElementById('pastePanel')
      panel.classList.toggle('active')
      if (panel.classList.contains('active')) {
        let html = ''
        for (let i = 1; i <= 6; i++) {
          if (i !== currentSlot) {
            html += `
              <div class="slot-option" onclick="selectPasteSlot(${i})" id="pasteSlot${i}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="8" x2="12" y2="16"/>
                  <line x1="8" y1="12" x2="16" y2="12"/>
                </svg>
                Slot ${i}
              </div>
            `
          }
        }
        document.getElementById('pasteSlots').innerHTML = html
      }
    }
    
    let copySlots = []
    function toggleCopySlot(slot) {
      const el = document.getElementById(`copySlot${slot}`)
      if (copySlots.includes(slot)) {
        copySlots = copySlots.filter(s => s !== slot)
        el.classList.remove('selected')
      } else {
        copySlots.push(slot)
        el.classList.add('selected')
      }
    }
    
    async function executeCopy() {
      if (copySlots.length === 0) {
        showStatus('Selectează sloturi', 'error')
        return
      }
      
      try {
        const res = await fetch('/api/card/copy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ source: currentSlot, targets: copySlots })
        })
        const data = await res.json()
        
        if (data.success) {
          showStatus(`Copiat în sloturile ${copySlots.join(', ')}`, 'success')
          setTimeout(() => location.reload(), 1500)
        }
      } catch (e) {
        showStatus('Eroare', 'error')
      }
    }
    
    let pasteSlot = null
    function selectPasteSlot(slot) {
      pasteSlot = slot
      document.querySelectorAll('#pasteSlots .slot-option').forEach(el => el.classList.remove('selected'))
      document.getElementById(`pasteSlot${slot}`).classList.add('selected')
    }
    
    async function executePaste() {
      if (!pasteSlot) {
        showStatus('Selectează un slot sursă', 'error')
        return
      }
      
      try {
        const res = await fetch('/api/card/copy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ source: pasteSlot, targets: [currentSlot] })
        })
        const data = await res.json()
        
        if (data.success) {
          showStatus(`Copiat din slot ${pasteSlot}`, 'success')
          setTimeout(() => location.reload(), 1500)
        }
      } catch (e) {
        showStatus('Eroare', 'error')
      }
    }
    
    async function saveCurrentSlot() {
      const colorInfo = colors.find(c => c.id === selectedColor)
      if (!colorInfo) return showStatus('Alege o culoare', 'error')
      
      const data = {
        slot: currentSlot,
        active: document.getElementById('activeSel').value === 'true',
        dotClass: colorInfo.dot,
        category: document.getElementById('cat').value,
        title: document.getElementById('title').value,
        date: document.getElementById('date').value,
        username: document.getElementById('user').value,
        tagColor: colorInfo.tag,
        tag1: document.getElementById('tag1').value,
        tag2: document.getElementById('tag2').value,
        link: document.getElementById('link').value,
        buttonText: document.getElementById('btnText').value
      }
      
      if (!data.title || !data.category || !data.date || !data.username) {
        return showStatus('Completează toate câmpurile obligatorii', 'error')
      }
      
      try {
        const res = await fetch('/api/card/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        })
        const resData = await res.json()
        
        if (resData.success) {
          showStatus(`Slot ${currentSlot} salvat!`, 'success')
          await loadCards()
        }
      } catch (e) {
        showStatus('Eroare la salvare', 'error')
      }
    }
    
    function showStatus(msg, type) {
      const status = document.getElementById('status')
      status.className = 'status ' + type
      status.innerText = msg
      setTimeout(() => status.className = 'status', 2000)
    }
    
    loadCards()
  </script>
</body>
</html>
