<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 WildFire Page Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@400;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.1.0/dist/iconify-icon.min.js" async></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--panel:#0d0d0d;--card:#111;--border:rgba(255,255,255,0.065);
  --accent:#ff8c00;--accent-dim:rgba(255,140,0,0.1);--accent-border:rgba(255,140,0,0.28);--accent-glow:rgba(255,140,0,0.18);
  --text:#e2e2e2;--muted:#555;--dim:#888;--r:8px;--r2:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}

/* ── Toolbar ── */
#toolbar{background:linear-gradient(180deg,rgba(18,18,22,0.95),rgba(12,12,14,0.98));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,140,0,0.06);display:flex;align-items:center;gap:6px;padding:0 16px;height:48px;flex-shrink:0;position:relative;z-index:20}
#toolbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(255,140,0,0.5) 25%,rgba(255,100,0,0.6) 50%,rgba(255,140,0,0.5) 75%,transparent 100%);pointer-events:none}
#toolbar .logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
#toolbar .logo iconify-icon{color:#ff8c00;filter:drop-shadow(0 0 8px rgba(255,140,0,0.5))}
#toolbar h1{font-family:'Orbitron',sans-serif;font-size:11.5px;font-weight:900;background:linear-gradient(135deg,#ff8c00,#ffc042,#ff8c00);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;letter-spacing:1.2px;animation:shimmer 3s ease infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.tb-sep{width:1px;height:22px;background:linear-gradient(180deg,transparent,rgba(255,255,255,0.06),transparent);flex-shrink:0}
.tb-group{display:flex;gap:3px;align-items:center}
.tb-btn{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);color:var(--dim);padding:0 10px;border-radius:8px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:.4px;white-space:nowrap;transition:all .18s cubic-bezier(.4,0,.2,1);height:30px;display:flex;align-items:center;gap:6px;position:relative;overflow:hidden}
.tb-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,140,0,0.08),transparent);opacity:0;transition:opacity .18s;border-radius:inherit}
.tb-btn:hover::before{opacity:1}
.tb-btn:hover{border-color:var(--accent-border);color:var(--accent);box-shadow:0 0 16px rgba(255,140,0,0.08),inset 0 1px 0 rgba(255,255,255,0.03)}
.tb-btn:active{transform:scale(0.97)}
.tb-btn iconify-icon{font-size:15px;flex-shrink:0}
.tb-btn.on{background:rgba(255,140,0,0.08);border-color:var(--accent-border);color:var(--accent);box-shadow:0 0 14px rgba(255,140,0,0.1),inset 0 0 12px rgba(255,140,0,0.04)}
.tb-btn.save{background:linear-gradient(135deg,rgba(0,200,81,0.15),rgba(0,168,68,0.08));border:1px solid rgba(0,200,81,0.3);color:#4ade80;font-weight:800}
.tb-btn.save:hover{box-shadow:0 0 18px rgba(0,200,81,0.2);border-color:rgba(0,200,81,0.5)}
.tb-btn.save iconify-icon{color:#4ade80}
.tb-btn.danger{border-color:rgba(255,68,68,0.15);color:#ff6666}
.tb-btn.danger:hover{background:rgba(255,68,68,0.06);border-color:rgba(255,68,68,0.4);box-shadow:0 0 14px rgba(255,68,68,0.08)}
#save-path{width:170px;font-size:11px;height:30px;padding:0 10px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);transition:all .18s}
#save-path:focus{border-color:rgba(0,200,81,0.4);box-shadow:0 0 0 2px rgba(0,200,81,0.06)}
.hdr-status{font-size:8.5px;color:rgba(255,140,0,0.4);font-family:'Orbitron',sans-serif;letter-spacing:.4px;margin-left:auto;flex-shrink:0;display:flex;align-items:center;gap:5px}
.hdr-status::before{content:'';width:5px;height:5px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,0.5);flex-shrink:0}
.ttabs{display:flex;gap:3px}
.ttab{background:none;border:1px solid rgba(255,255,255,0.04);color:var(--muted);padding:3px 10px;border-radius:20px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:7.5px;font-weight:700;letter-spacing:.5px;transition:all .2s}
.ttab:hover{border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim)}
.ttab.on{background:linear-gradient(135deg,#ff8c00,#ff6b35);border-color:transparent;color:#000;box-shadow:0 2px 12px rgba(255,140,0,0.35),inset 0 1px 0 rgba(255,255,255,0.15)}

/* ── Main ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── Left panel ── */
#lp{width:320px;flex-shrink:0;background:linear-gradient(180deg,rgba(13,13,15,0.98),rgba(10,10,12,0.98));backdrop-filter:blur(8px);border-right:1px solid rgba(255,140,0,0.06);display:flex;flex-direction:column;overflow-y:auto;transition:width .28s cubic-bezier(.4,0,.2,1),opacity .22s ease;position:relative}
#lp::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(255,140,0,0.2),transparent 40%,transparent 60%,rgba(255,140,0,0.1));pointer-events:none}
#lp.closed{width:0;min-width:0;opacity:0;overflow:hidden;border-right-width:0}
#lp.closed::after{display:none}
#lp::-webkit-scrollbar{width:3px}
#lp::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--accent-border),transparent);border-radius:2px}
.sec{border-bottom:1px solid var(--border);padding:14px 16px}
.sec-hd{font-family:'Orbitron',sans-serif;font-size:9.5px;font-weight:700;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:13px;display:flex;justify-content:space-between;align-items:center;padding-bottom:9px;border-bottom:1px solid rgba(255,140,0,0.08);position:relative}
.sec-hd::after{content:'';position:absolute;bottom:-1px;left:0;width:26px;height:1px;background:var(--accent)}
.sec-hd span{color:var(--muted);font-size:10px;font-family:'Inter',sans-serif;letter-spacing:0;text-transform:none}
.fg{margin-bottom:10px}
.fl{display:block;font-size:10.5px;color:var(--muted);margin-bottom:4px;letter-spacing:.2px}
#lp input[type=text],#lp textarea,#lp select,#modal input[type=text],#modal textarea,#modal select,#toolbar input[type=text]{width:100%;background:rgba(255,255,255,0.025);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:var(--r);font-family:inherit;font-size:12px;outline:none;resize:vertical;transition:border-color .2s,box-shadow .2s,background .2s}
#lp input[type=text]:focus,#lp textarea:focus,#lp select:focus,#modal input[type=text]:focus,#modal textarea:focus,#modal select:focus,#toolbar input[type=text]:focus{border-color:var(--accent);background:rgba(255,140,0,0.03);box-shadow:0 0 0 2px rgba(255,140,0,0.07)}
#lp input[type=text]::placeholder,#lp textarea::placeholder,#modal input[type=text]::placeholder,#modal textarea::placeholder{color:var(--muted)}
select{cursor:pointer;height:32px}
#tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px;min-height:4px}
.tchip{background:linear-gradient(135deg,rgba(255,140,0,0.12),rgba(255,140,0,0.06));border:1px solid rgba(255,140,0,0.28);color:var(--accent);padding:3px 8px;border-radius:20px;font-size:10px;display:flex;align-items:center;gap:4px;font-family:'Orbitron',sans-serif;font-weight:600}
.tchip button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;line-height:1;opacity:.4;transition:opacity .15s}
.tchip button:hover{opacity:1}
.tag-add-row{display:flex;gap:5px}
.tag-add-row input{flex:1}
.tag-add-row select{flex:1}
.tag-add-row button{flex-shrink:0;background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent);padding:5px 11px;border-radius:var(--r);cursor:pointer;font-weight:800;font-size:15px;line-height:1;transition:all .15s}
.tag-add-row button:hover{background:rgba(255,140,0,0.18);box-shadow:0 0 8px rgba(255,140,0,0.2)}

/* ── Block list ── */
#blk-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.blk{background:var(--card);border:1px solid var(--border);border-left:2px solid rgba(255,140,0,0.2);border-radius:var(--r);padding:7px 9px 7px 10px;display:flex;align-items:center;gap:7px;transition:all .18s}
.blk:hover{border-color:rgba(255,140,0,0.22);border-left-color:var(--accent);background:rgba(255,140,0,0.025);transform:translateX(2px)}
.blk[data-t^="section"]{border-left-color:rgba(99,179,237,0.45)}
.blk[data-t="tip"]{border-left-color:rgba(72,187,120,0.45)}
.blk[data-t="media"]{border-left-color:rgba(159,122,234,0.45)}
.blk[data-t="custom-list"],.blk[data-t="info-box"]{border-left-color:rgba(237,211,91,0.45)}
.blk[data-t="collapse-group"]{border-left-color:rgba(66,153,225,0.45)}
.blk[data-t="link-button"]{border-left-color:rgba(104,211,145,0.5)}
.blk[data-t="price-card"]{border-left-color:rgba(255,215,0,0.45)}
.blk[data-t="stat-row"]{border-left-color:rgba(200,140,255,0.45)}
.blk[data-t="divider"]{border-left-color:rgba(255,255,255,0.15)}
.blk[data-t="media-gallery"]{border-left-color:rgba(159,122,234,0.5)}
.blk[data-t="step-list"]{border-left-color:rgba(72,187,120,0.5)}
.blk[data-t="callout"]{border-left-color:rgba(66,153,225,0.5)}
.blk-badge{background:rgba(255,140,0,0.1);color:#ff9a1a;padding:2px 6px;border-radius:4px;font-size:9px;font-family:'Orbitron',sans-serif;font-weight:700;flex-shrink:0;white-space:nowrap;letter-spacing:.3px}
.blk-txt{flex:1;font-size:11px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.blk-acts{display:flex;gap:3px;flex-shrink:0}
.bi{background:none;border:1px solid var(--border);color:var(--muted);width:22px;height:22px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.bi:hover{border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim)}
.bi.del:hover{border-color:rgba(255,68,68,0.4);color:#ff6666;background:rgba(255,68,68,0.07)}
#no-blocks{text-align:center;color:var(--muted);font-size:10.5px;padding:28px 10px;font-family:'Orbitron',sans-serif;letter-spacing:.5px;line-height:2.2}
#no-blocks::before{content:'\25C8';display:block;font-size:22px;opacity:.18;margin-bottom:6px}
#add-wrap{position:relative}
#add-btn{width:100%;background:linear-gradient(135deg,rgba(255,140,0,0.08),rgba(255,140,0,0.03));border:1px dashed rgba(255,140,0,0.3);color:var(--accent);padding:9px;border-radius:var(--r);cursor:pointer;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;transition:all .2s}
#add-btn:hover{background:rgba(255,140,0,0.1);border-style:solid;box-shadow:0 0 14px rgba(255,140,0,0.12)}
#add-dd{position:absolute;bottom:calc(100% + 6px);left:0;right:0;background:#161616;border:1px solid rgba(255,140,0,0.15);border-radius:var(--r2);padding:6px;display:none;z-index:50;box-shadow:0 -8px 32px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.02)}
#add-dd.open{display:block;animation:ddIn .14s ease}
@keyframes ddIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.add-opt{padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:9px;transition:all .12s;color:var(--dim)}
.add-opt:hover{background:var(--accent-dim);color:var(--accent);padding-left:14px}
.add-opt-ico{width:16px;text-align:center;font-size:13px}

/* ── Editor pane ── */
#editor-pane{flex:1;display:flex;flex-direction:column;min-width:0;background:#06060a;border-right:1px solid rgba(255,255,255,0.04);position:relative}
.pane-hd{font-family:'Orbitron',sans-serif;font-size:8px;color:rgba(255,255,255,0.28);letter-spacing:1.5px;padding:6px 16px;border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0;background:linear-gradient(180deg,rgba(255,255,255,0.015),transparent);user-select:none;display:flex;align-items:center;gap:8px}
.pane-hd::before{content:'';width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pane-hd .dots{display:flex;gap:4px;margin-right:4px}
.pane-hd .dots span{width:7px;height:7px;border-radius:50%;display:block}
.pane-hd .dots span:nth-child(1){background:#ff5f57;box-shadow:0 0 4px rgba(255,95,87,0.3)}
.pane-hd .dots span:nth-child(2){background:#febc2e;box-shadow:0 0 4px rgba(254,188,46,0.3)}
.pane-hd .dots span:nth-child(3){background:#28c840;box-shadow:0 0 4px rgba(40,200,64,0.3)}
#editor-pane .pane-hd::before{background:#ff8c00;box-shadow:0 0 6px rgba(255,140,0,0.4)}
#md-out{flex:1;background:transparent;border:none;color:#c8d6e5;font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:12.5px;padding:16px 20px;resize:none;outline:none;line-height:1.8;width:100%;tab-size:2;caret-color:#ff8c00}
#md-out::placeholder{color:rgba(255,140,0,0.12);font-family:'Orbitron',sans-serif;font-size:9.5px;letter-spacing:1.2px}
#md-out::selection{background:rgba(255,140,0,0.18)}

/* ── Resize handle ── */
#resize-handle{width:5px;cursor:col-resize;background:transparent;flex-shrink:0;position:relative;z-index:5;transition:background .15s}
#resize-handle::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:3px;height:32px;border-radius:3px;background:rgba(255,255,255,0.06);transition:all .2s}
#resize-handle:hover::after{background:rgba(255,140,0,0.4);height:48px;box-shadow:0 0 8px rgba(255,140,0,0.15)}
#resize-handle:active::after{background:rgba(255,140,0,0.6);box-shadow:0 0 12px rgba(255,140,0,0.25)}

/* ── Preview pane ── */
#prev-wrap{flex:1;overflow:hidden;background:#0a0a0e;position:relative;display:flex;flex-direction:column;min-width:0}
#prev-wrap .pane-hd::before{background:#63b3ed;box-shadow:0 0 6px rgba(99,179,237,0.4)}
#prev-frame{flex:1;width:100%;border:none;background:#0a0a0e;display:none}
#prev-loading{position:absolute;top:30px;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,140,0,0.3);font-family:'Orbitron',sans-serif;font-size:10px;pointer-events:none;gap:16px;letter-spacing:1.5px}
#prev-loading::after{content:'';width:24px;height:24px;border:2px solid rgba(255,140,0,0.08);border-top-color:rgba(255,140,0,0.6);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Buttons ── */
.btn{background:linear-gradient(135deg,#ff8c00,#ff6b35);color:#000;border:none;padding:6px 14px;border-radius:var(--r);cursor:pointer;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;white-space:nowrap;transition:all .2s}
.btn:hover{box-shadow:0 0 14px rgba(255,140,0,0.4);filter:brightness(1.07)}
.btn.sec{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--dim)}
.btn.sec:hover{border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim)}
.btn.ok{background:linear-gradient(135deg,#00c851,#00a844);color:#000}
.btn.ok:hover{box-shadow:0 0 12px rgba(0,200,81,0.35)}

/* ── Modal ── */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
#ov.open{display:flex}
#modal{background:linear-gradient(180deg,rgba(18,18,22,0.97),rgba(12,12,14,0.98));border:1px solid rgba(255,140,0,0.12);border-radius:20px;padding:28px;width:520px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.85),0 0 60px rgba(255,140,0,0.04),inset 0 1px 0 rgba(255,255,255,0.04);animation:modalIn .22s cubic-bezier(.4,0,.2,1);position:relative}
#modal::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,140,0,0.3),transparent);pointer-events:none}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
#modal::-webkit-scrollbar{width:3px}
#modal::-webkit-scrollbar-thumb{background:var(--accent-border);border-radius:2px}
#modal h2{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--accent);margin-bottom:20px;letter-spacing:.8px;padding-bottom:12px;border-bottom:1px solid rgba(255,140,0,0.08);display:flex;align-items:center;gap:8px}
.mf{margin-bottom:12px}
.mf label{display:block;font-size:10.5px;color:var(--muted);margin-bottom:4px;letter-spacing:.2px}
#m-footer{display:flex;justify-content:flex-end;gap:7px;margin-top:20px;padding-top:14px;border-top:1px solid var(--border)}
.faq-pair{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:7px}
.faq-pair-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-size:10.5px;color:var(--accent);font-family:'Orbitron',sans-serif}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,rgba(22,22,22,0.92),rgba(14,14,14,0.95));backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,140,0,0.3);color:var(--accent);padding:11px 20px;border-radius:12px;font-family:'Orbitron',sans-serif;font-size:10.5px;font-weight:700;z-index:300;opacity:0;transform:translateY(12px) scale(.94);transition:all .32s cubic-bezier(.34,1.56,.64,1);pointer-events:none;box-shadow:0 12px 40px rgba(0,0,0,.6),0 0 20px rgba(255,140,0,0.06),inset 0 1px 0 rgba(255,255,255,0.03);letter-spacing:.6px;display:flex;align-items:center;gap:8px}
#toast.on{opacity:1;transform:translateY(0) scale(1)}
#toast.err{border-color:rgba(255,68,68,0.35);color:#ff6666;box-shadow:0 12px 40px rgba(0,0,0,.6),0 0 16px rgba(255,68,68,0.08)}
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <div class="logo">
    <iconify-icon icon="lucide:flame" width="20" height="20"></iconify-icon>
    <h1>WF EDITOR</h1>
  </div>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="blocks-btn" onclick="toggleBlocks()" title="Toggle block generator"><iconify-icon icon="lucide:layout-grid" width="14" height="14"></iconify-icon>BLOCKS</button>
  <div class="ttabs" id="ttabs"></div>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <button class="tb-btn" onclick="loadMD()" title="Load .md file"><iconify-icon icon="lucide:folder-open" width="14" height="14"></iconify-icon>LOAD</button>
    <button class="tb-btn" onclick="regenMD()" title="Regenerate from blocks"><iconify-icon icon="lucide:refresh-cw" width="14" height="14"></iconify-icon>REGEN</button>
    <button class="tb-btn" onclick="copyMD()" title="Copy markdown"><iconify-icon icon="lucide:clipboard-copy" width="14" height="14"></iconify-icon>COPY</button>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <input type="text" id="save-path" placeholder="path/to/file.md">
    <button class="tb-btn save" onclick="saveFile()" title="Save file"><iconify-icon icon="lucide:save" width="14" height="14"></iconify-icon>SAVE</button>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <button class="tb-btn" onclick="exportState()" title="Export project JSON"><iconify-icon icon="lucide:upload" width="14" height="14"></iconify-icon></button>
    <button class="tb-btn" onclick="importState()" title="Import project JSON"><iconify-icon icon="lucide:download" width="14" height="14"></iconify-icon></button>
    <button class="tb-btn danger" onclick="clearAll()" title="Clear all"><iconify-icon icon="lucide:trash-2" width="14" height="14"></iconify-icon></button>
  </div>
  <input type="file" id="imp-file" accept=".json" style="display:none" onchange="handleImport(event)">
  <input type="file" id="load-md-file" accept=".md,.markdown" style="display:none" onchange="handleLoadMD(event)">
  <span class="hdr-status" id="hdr-status">Ready</span>
</div>

<div id="main">
  <!-- Blocks Sidebar (hidden by default) -->
  <div id="lp" class="closed">
    <div class="sec">
      <div class="sec-hd">CaseHeader</div>
      <div class="fg"><label class="fl">Page Title</label>
        <input type="text" id="f-title" placeholder="e.g. Sank Sounds" oninput="us()"></div>
      <div class="fg"><label class="fl">Badge Text</label>
        <input type="text" id="f-badge" placeholder="e.g. Sounds" oninput="us()"></div>
      <div class="fg"><label class="fl">Badge Icon</label>
        <input type="text" id="f-icon" placeholder="lucide:music" oninput="us()"></div>
      <div class="fg"><label class="fl">Page ID</label>
        <input type="text" id="f-pid" placeholder="sank-sounds" oninput="us()"></div>
      <div class="fg"><label class="fl">Path (comma-separated)</label>
        <input type="text" id="f-path" placeholder="Home, Market, Premium Shop" oninput="us()"></div>
      <div class="fg"><label class="fl">Tags</label>
        <div id="tags-row"></div>
        <div class="tag-add-row">
          <input type="text" id="tag-txt" placeholder="tag text" onkeydown="if(event.key==='Enter'){event.preventDefault();addTag()}">
          <select id="tag-col">
            <option value="PageTagOrange">Orange</option>
            <option value="PageTagRed">Red</option>
            <option value="PageTagBlue">Blue</option>
            <option value="PageTagGreen">Green</option>
            <option value="PageTagPurple">Purple</option>
            <option value="PageTagYellow">Yellow</option>
          </select>
          <button onclick="addTag()">+</button>
        </div>
      </div>
    </div>
    <div class="sec" style="flex:1;min-height:0">
      <div class="sec-hd">Content Blocks <span id="blk-cnt"></span></div>
      <div id="blk-list"></div>
      <div id="add-wrap">
        <button id="add-btn" onclick="toggleDD()">+ ADD BLOCK</button>
        <div id="add-dd"></div>
      </div>
    </div>
  </div>

  <!-- Editor -->
  <div id="editor-pane">
    <div class="pane-hd"><div class="dots"><span></span><span></span><span></span></div>EDITOR</div>
    <textarea id="md-out" spellcheck="false" oninput="lockMD()" onpaste="onEditorPaste()" placeholder="Load a .md file or start typing..."></textarea>
  </div>

  <!-- Resize Handle -->
  <div id="resize-handle"></div>

  <!-- Preview -->
  <div id="prev-wrap">
    <div class="pane-hd"><div class="dots"><span></span><span></span><span></span></div>PREVIEW</div>
    <div id="prev-loading">LOADING PREVIEW...</div>
    <iframe id="prev-frame" title="Page Preview"></iframe>
  </div>
</div>

<!-- Modal -->
<div id="ov" onclick="ovClick(event)">
  <div id="modal">
    <h2 id="m-title">Edit Block</h2>
    <div id="m-body"></div>
    <div id="m-footer">
      <button class="btn sec" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveModal()">Save Block</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let S = {
  tmpl: 'wf-system',
  hdr: { title:'', badge:'', icon:'lucide:star', pid:'', path:'Home, Systems', tags:[] },
  blocks: [],
  mdConfig: 'outline: deep'
};
let _id = 0;
const uid = () => String(++_id);
let editId = null;
let wikiCSS = ''; // kept for backward compat but not embedded inline

// ═══════════════════════════════════════════════
// TEMPLATE META
// ═══════════════════════════════════════════════
const TM = {
  'wf-system':   { label:'wf-system',   wrapper:'wf-system',   prefix:'wf-system',   defPath:'Home, Systems'    },
  'wf-market':   { label:'wf-market',   wrapper:'wf-market',   prefix:'wf-market',   defPath:'Home, Market'     },
  'wf-currency': { label:'wf-currency', wrapper:null,          prefix:'wf-currency', defPath:'Home, Currency'   },
  'wf-info':     { label:'wf-info',     wrapper:null,          prefix:'wf-info',     defPath:'Home, Informatii' },
};

const BTYPES = {
  'wf-system':   [
    {t:'section-title',l:'Section Title',i:'📌'},{t:'card',l:'Card',i:'🃏'},{t:'tip',l:'Tip Box',i:'💡'},
    {t:'key-row',l:'Key Row',i:'⌨'},{t:'type-grid',l:'Type Grid',i:'▦'},
    {t:'stat-row',l:'Stat Row',i:'📊'},{t:'badge-group',l:'Badge Group',i:'🏷'},
    {t:'custom-list',l:'Custom List',i:'📋'},{t:'info-box',l:'Info Box',i:'📦'},
    {t:'step-list',l:'Step List',i:'📝'},{t:'callout',l:'Callout Box',i:'📢'},
    {t:'media',l:'Image / GIF / Video',i:'🖼'},{t:'media-gallery',l:'Media Gallery',i:'🖼'},{t:'link-button',l:'Link Button',i:'🔗'},
  ],
  'wf-market':   [
    {t:'section-title',l:'Section Title',i:'📌'},{t:'card',l:'Card',i:'🃏'},{t:'tip',l:'Tip Box',i:'💡'},
    {t:'price-card',l:'Price Card',i:'💰'},{t:'stat-row',l:'Stat Row',i:'📊'},{t:'badge-group',l:'Badge Group',i:'🏷'},
    {t:'custom-list',l:'Custom List',i:'📋'},{t:'info-box',l:'Info Box',i:'📦'},
    {t:'step-list',l:'Step List',i:'📝'},{t:'callout',l:'Callout Box',i:'📢'},
    {t:'media',l:'Image / GIF / Video',i:'🖼'},{t:'media-gallery',l:'Media Gallery',i:'🖼'},{t:'link-button',l:'Link Button',i:'🔗'},
  ],
  'wf-currency': [
    {t:'section-title',l:'Section Title',i:'📌'},{t:'card',l:'Card',i:'🃏'},{t:'tip',l:'Tip Box',i:'💡'},
    {t:'feature-chips',l:'Feature Chips',i:'✨'},{t:'stat-row',l:'Stat Row',i:'📊'},{t:'badge-group',l:'Badge Group',i:'🏷'},
    {t:'info-box',l:'Info Box',i:'📦'},
    {t:'step-list',l:'Step List',i:'📝'},{t:'callout',l:'Callout Box',i:'📢'},
    {t:'media',l:'Image / GIF / Video',i:'🖼'},{t:'media-gallery',l:'Media Gallery',i:'🖼'},{t:'link-button',l:'Link Button',i:'🔗'},
  ],
  'wf-info': [
    {t:'info-section-title',l:'Section Title',i:'📌'},{t:'info-card',l:'Rule Card',i:'🃏'},
    {t:'punish-card',l:'Punish Card',i:'⚖'},{t:'collapse-group',l:'FAQ Collapse',i:'❓'},
    {t:'badge-group',l:'Badge Group',i:'🏷'},{t:'info-box',l:'Info Box',i:'📦'},{t:'divider',l:'Divider',i:'─'},
    {t:'callout',l:'Callout Box',i:'📢'},
    {t:'media',l:'Image / GIF / Video',i:'🖼'},{t:'media-gallery',l:'Media Gallery',i:'🖼'},{t:'link-button',l:'Link Button',i:'🔗'},
  ],
};

// ═══════════════════════════════════════════════
// DEFAULT BLOCK DATA
// ═══════════════════════════════════════════════
function defBlock(type) {
  const b = { id:uid(), type };
  switch(type) {
    case 'section-title':      return {...b, num:'1.0', title:'Section Title', icon:'lucide:star'};
    case 'info-section-title': return {...b, num:'1.0', title:'Section Title'};
    case 'card':               return {...b, icon:'lucide:info', number:'', highlight:'Title', body:'Content here.', variant:'', mediaItems:[], btnText:'', btnUrl:''};
    case 'stat-row':           return {...b, items:'1,234\nActive Users\n99.9%\nUptime\n50+\nFeatures'};
    case 'badge-group':        return {...b, items:'TAG 1|orange\nTAG 2|green\nTAG 3|blue'};
    case 'info-card':          return {...b, number:'1.1', text:'Rule content here.', mediaUrl:'', mediaLabel:'', mediaCaption:''};
    case 'tip':                return {...b, variant:'', icon:'lucide:info', body:'Tip content here.'};
    case 'custom-list':        return {...b, items:'Item one\nItem two\nItem three'};
    case 'info-box':           return {...b, items:'Note one\nNote two'};
    case 'collapse-group':     return {...b, items:[{q:'Question here?',a:'Answer here.'}]};
    case 'divider':            return b;
    case 'key-row':            return {...b, label:'Movement', keys:'W, A, S, D'};
    case 'type-grid':          return {...b, items:[{name:'Type 1',desc:'Description here.'},{name:'Type 2',desc:'Description here.'}]};
    case 'price-card':         return {...b, name:'Package Name', price:'10', currency:'EUR', desc:'Package description here.', features:'Feature one\nFeature two'};
    case 'feature-chips':      return {...b, items:'Feature one\nFeature two\nFeature three'};
    case 'punish-card':        return {...b, number:'1.1', text:'Rule text here.', badges:'MUTE, GAG', punishments:'BAN TEMPORAR'};
    case 'media':              return {...b, url:'', alt:'', label:'', caption:'', linkText:''};
    case 'link-button':        return {...b, text:'Click Here', url:'https://', style:'primary'};
    case 'media-gallery':      return {...b, cols:2, items:[{url:'', caption:''},{url:'', caption:''}]};
    case 'step-list':          return {...b, items:[{title:'Step 1', body:'Description here.'},{title:'Step 2', body:'Description here.'}]};
    case 'callout':            return {...b, variant:'info', icon:'', title:'Note', body:'Content here.'}
    default:                   return b;
  }
}

// ═══════════════════════════════════════════════
// HTML PREVIEW GENERATORS
// ═══════════════════════════════════════════════
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function getMediaType(url) {
  if (!url) return 'img';
  const lo = url.toLowerCase();
  if (/\.(mp4|webm|ogg|mov)(\?|$)/.test(lo)) return 'video';
  if (/youtube\.com\/watch|youtu\.be\//.test(lo)) return 'youtube';
  if (/\.(gif|png|jpg|jpeg|webp|svg|avif|bmp)(\?|$)/.test(lo)) return 'img';
  return 'link';
}
function getYoutubeId(url) {
  const m = url.match(/(?:youtu\.be\/|youtube\.com.*[?&]v=)([^&\s]+)/);
  return m ? m[1] : '';
}

function blkHTML(b) {
  const p = TM[S.tmpl].prefix;
  switch(b.type) {
    case 'section-title':      return hST(b,p);
    case 'info-section-title': return hIST(b);
    case 'card':               return hCard(b,p);
    case 'info-card':          return hIC(b);
    case 'punish-card':        return hPunishCard(b);
    case 'tip':                return hTip(b,p);
    case 'custom-list':        return hList(b,p);
    case 'info-box':           return hBox(b,p);
    case 'collapse-group':     return hCollapse(b);
    case 'divider':            return '<div class="wf-info-divider"></div>';
    case 'key-row':            return hKeyRow(b);
    case 'type-grid':          return hTypeGrid(b);
    case 'stat-row':           return hStatRow(b);
    case 'badge-group':        return hBadgeGroup(b);
    case 'price-card':         return hPriceCard(b);
    case 'feature-chips':      return hFeatureChips(b);
    case 'media':              return hMedia(b);
    case 'link-button':        return hLinkBtn(b);
    case 'media-gallery':      return hGallery(b);
    case 'step-list':          return hStepList(b);
    case 'callout':            return hCallout(b);
    default: return '';
  }
}

const BASE_URL = 'http://localhost:3001';
function resolveURL(url) {
  if (!url) return url;
  if (/^(https?:|data:|blob:)/.test(url)) return url;
  return BASE_URL + (url.startsWith('/') ? url : '/' + url);
}

const CIRC_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff8c00" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
const PLAY_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="#ff8c00" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>`;
const CHEV_SVG = `<svg class="wf-info-collapse-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>`;
const ICONIFY_CDN = '<' + 'script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.1.0/dist/iconify-icon.min.js" async><' + '/script>';

function hST(b,p) {
  const t = (b.title||'Section').toUpperCase();
  const ic = b.icon||'lucide:star';
  return `<div style="display:flex;align-items:center;gap:16px;margin:40px 0 25px 0;padding-bottom:12px;border-bottom:2px solid rgba(255,140,0,0.2);" class="${p}-title-hover">
  <span style="font-size:28px;font-weight:800;line-height:1;display:inline-block;background:linear-gradient(135deg,#ff8c00,#ff5500,#ff4400);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;" class="${p}-font"><iconify-icon icon="${ic}" width="28" height="28" style="color:#ff8c00;display:inline-block;vertical-align:middle;margin-right:8px;"></iconify-icon>${esc(b.num?b.num+' ':'')}${esc(t)}</span>
</div>`;
}

function hIST(b) {
  return `<div class="wf-info-title">${PLAY_SVG}<span>${esc(b.num?b.num+' ':'')}${esc((b.title||'Section').toUpperCase())}</span></div>`;
}

function hCardMedia(b) {
  const items = (b.mediaItems && b.mediaItems.length)
    ? b.mediaItems
    : (b.mediaUrl ? [{url:b.mediaUrl, label:b.mediaLabel||'', caption:b.mediaCaption||''}] : []);
  if (!items.length) return '';
  return items.filter(m=>m.url).map(m => {
    const url = resolveURL(m.url);
    const type = getMediaType(m.url);
    const lbl = m.label ? `<div style="position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);padding:4px 12px;border-radius:20px;font-size:11px;font-family:'Orbitron',monospace;color:#ff8c00;">${esc(m.label)}</div>` : '';
    const cap = m.caption ? `<div style="text-align:center;padding:10px 12px 4px;font-size:12px;color:#999;">${esc(m.caption)}</div>` : '';
    let el;
    if (type==='video') el=`<video src="${url}" controls style="width:100%;max-width:800px;height:auto;display:block;margin:0 auto;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.2);"></video>`;
    else if (type==='youtube'){const id=getYoutubeId(m.url);el=`<iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:16/9;border-radius:12px;display:block;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,0.2);"></iframe>`;}
    else el=`<img src="${url}" alt="${esc(m.label||'')}" style="width:100%;max-width:800px;height:auto;display:block;margin:0 auto;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.2);" loading="lazy">`;
    return `<div style="margin:16px 0;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,rgba(255,140,0,0.1),rgba(255,140,0,0.02));border:1px solid rgba(255,140,0,0.2);padding:8px;"><div style="position:relative;border-radius:12px;overflow:hidden;">${el}${lbl}</div>${cap}</div>`;
  }).join('');
}

function hCard(b,p) {
  const num   = b.number ? `<span class="${p}-number">${esc(b.number)}</span> ` : '';
  const hl    = b.highlight ? `<span class="${p}-highlight">${esc(b.highlight)}</span>` : '';
  const media = hCardMedia(b);
  const btn   = b.btnText ? `<div style="margin-top:12px;"><a href="${b.btnUrl||'#'}" target="_blank" style="display:inline-block;background:linear-gradient(135deg,#ff8c00,#ff6b35);color:#000;padding:7px 18px;border-radius:6px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;text-decoration:none;">${esc(b.btnText)}</a></div>` : '';
  const vMap  = {success:'border-color:rgba(0,200,81,0.4);',danger:'border-color:rgba(255,68,68,0.4);',pro:'border-color:rgba(159,122,234,0.4);'};
  const varStyle = vMap[b.variant]||'';
  const ic = b.icon||'lucide:info';
  const bodyHTML = (b.body||'').split('\n').filter(l=>l.trim()).map(l=>`<p>${esc(l)}</p>`).join('')||'<p></p>';
  return `<div class="${p}-card" style="${varStyle}">
  <div class="${p}-icon"><iconify-icon icon="${ic}" width="18" height="18" style="color:#ff8c00;"></iconify-icon></div>
  <div class="${p}-content">${num}${hl}
    ${bodyHTML}
    ${media}${btn}
  </div>
</div>`;
}

function hIC(b) {
  const sm  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff8c00" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
  const num = b.number ? `<span class="wf-info-number wf-info-font">${esc(b.number)}</span> ` : '';
  const media = hCardMedia(b);
  return `<div class="wf-info-card"><div class="wf-info-icon">${sm}</div><div class="wf-info-content">${num}${esc(b.text||'')}${media}</div></div>`;
}

function hTip(b,p) {
  const cls = b.variant ? ` ${b.variant}` : '';
  const col = b.variant==='orange'?'#ff8c00':b.variant==='red'?'#ff4444':'#00c851';
  const ic = b.icon||(b.variant==='orange'?'lucide:info':b.variant==='red'?'lucide:alert-triangle':'lucide:check-circle');
  return `<div class="${p}-tip${cls}">
  <iconify-icon icon="${ic}" width="22" height="22" style="color:${col};flex-shrink:0;"></iconify-icon>
  <span>${esc(b.body||'')}</span>
</div>`;
}

function hList(b,p) {
  const ck = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff8c00" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`;
  const lis = (b.items||'').split('\n').filter(l=>l.trim()).map(l=>`<li>${ck}<span>${esc(l)}</span></li>`).join('');
  return `<ul class="${p}-custom-list">${lis}</ul>`;
}

function hBox(b,p) {
  const inf = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
  const cls = S.tmpl==='wf-info'?'wf-info-box':`${p}-box`;
  const lis = (b.items||'').split('\n').filter(l=>l.trim()).map(l=>`<li>${inf}<span>${esc(l)}</span></li>`).join('');
  return `<div class="${cls}"><ul>${lis}</ul></div>`;
}

function hCollapse(b) {
  const items = (b.items||[]).map(it=>`
  <div class="wf-info-collapse-item">
    <div class="wf-info-collapse-header" onclick="this.classList.toggle('active');this.nextElementSibling.classList.toggle('show')">
      <div class="wf-info-collapse-icon">${PLAY_SVG}</div>
      <span class="wf-info-collapse-title">${esc(it.q||'')}</span>
      ${CHEV_SVG}
    </div>
    <div class="wf-info-collapse-content"><p>${esc(it.a||'')}</p></div>
  </div>`).join('');
  return `<div class="wf-info-collapse">${items}</div>`;
}

function hKeyRow(b) {
  const keys = (b.keys||'').split(',').map(k=>k.trim()).filter(Boolean);
  const label = b.label ? `<span style="font-size:12px;color:#999;margin-right:10px;font-family:'Inter',sans-serif;">${esc(b.label)}:</span>` : '';
  const keyHtml = keys.map(k=>`<span class="wf-system-key-button">${esc(k)}</span>`).join('');
  return `<div class="wf-system-key-row"><span class="wf-system-key-item">${label}${keyHtml}</span></div>`;
}

function hTypeGrid(b) {
  const cards = (b.items||[]).map(it=>`<div class="wf-system-type-card"><span class="wf-system-type-name">${esc(it.name||'')}</span><p style="font-size:12px;color:#999;margin:4px 0 0;">${esc(it.desc||'')}</p></div>`).join('');
  return `<div class="wf-system-type-grid">${cards}</div>`;
}

function hPriceCard(b) {
  const p = TM[S.tmpl].prefix;
  const feats = (b.features||'').split('\n').filter(l=>l.trim());
  const ck = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ff8c00" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`;
  const featHtml = feats.length ? `<div style="display:flex;flex-direction:column;gap:5px;margin-top:10px;">${feats.map(f=>`<span style="display:flex;align-items:center;gap:6px;font-size:12px;">${ck}${esc(f)}</span>`).join('')}</div>` : '';
  return `<div class="${p}-card" style="text-align:center;">
  <div class="${p}-content" style="width:100%;">
    <div style="font-family:'Orbitron',sans-serif;font-size:30px;font-weight:800;color:#ff8c00;margin-bottom:4px;">${esc(b.price||'0')} <span style="font-size:16px;opacity:0.7;">${esc(b.currency||'EUR')}</span></div>
    <span class="${p}-highlight" style="font-size:16px;">${esc(b.name||'Package')}</span>
    <p style="margin-top:8px;">${esc(b.desc||'')}</p>
    ${featHtml}
  </div>
</div>`;
}

function hFeatureChips(b) {
  const ck = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`;
  const chips = (b.items||'').split('\n').filter(l=>l.trim()).map(l=>`<span class="wf-currency-feature">${ck}${esc(l)}</span>`).join('');
  return `<div class="wf-currency-features" style="flex-wrap:wrap;gap:8px;">${chips}</div>`;
}

function hPunishCard(b) {
  const sm = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff8c00" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`;
  const punishments = (b.punishments||'').split(',').map(p=>p.trim()).filter(Boolean);
  const badges      = (b.badges||'').split(',').map(p=>p.trim()).filter(Boolean);
  const punHtml   = punishments.map(p=>`<span class="wf-info-punish wf-info-font">${esc(p)}</span>`).join(' ');
  const badgeHtml = badges.map(p=>`<span class="wf-info-badge wf-info-font">${esc(p)}</span>`).join(' ');
  const num = b.number ? `<span class="wf-info-number wf-info-font">${esc(b.number)}</span> ` : '';
  return `<div class="wf-info-card"><div class="wf-info-icon">${sm}</div><div class="wf-info-content">${num}${esc(b.text||'')}<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:5px;">${badgeHtml}${punHtml}</div></div></div>`;
}

function hMedia(b) {
  const rawUrl = b.url||'';
  const url  = resolveURL(rawUrl);
  const type = getMediaType(rawUrl);
  const lbl  = b.label ? `<div style="position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);padding:4px 12px;border-radius:20px;font-size:11px;font-family:'Orbitron',monospace;color:#ff8c00;">${esc(b.label)}</div>` : '';
  const cap  = b.caption ? `<div style="text-align:center;padding:10px 12px 4px;font-size:12px;color:#999;">${esc(b.caption)}</div>` : '';
  if (!rawUrl) return `<div style="margin:20px 0;padding:20px;background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.1);border-radius:12px;text-align:center;color:#555;font-size:12px;">No media URL set — click Edit to add one</div>`;
  if (type==='link') return `<div style="margin:20px 0;padding:16px;background:rgba(255,140,0,0.06);border:1px solid rgba(255,140,0,0.25);border-radius:12px;text-align:center;"><a href="${rawUrl}" target="_blank" style="color:#ff8c00;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;text-decoration:none;">${esc(b.linkText||url)}</a></div>`;
  let el;
  if (type==='video') el=`<video src="${url}" controls style="width:100%;max-width:800px;height:auto;display:block;margin:0 auto;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.2);"></video>`;
  else if (type==='youtube'){const id=getYoutubeId(url);el=`<iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:16/9;border-radius:12px;display:block;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,0.2);"></iframe>`;}
  else el=`<img src="${url}" alt="${esc(b.alt||b.label||'')}" style="width:100%;max-width:800px;height:auto;display:block;margin:0 auto;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.2);" loading="lazy">`;
  return `<div style="margin:24px 0;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,rgba(255,140,0,0.1),rgba(255,140,0,0.02));border:1px solid rgba(255,140,0,0.2);padding:8px;"><div style="position:relative;border-radius:12px;overflow:hidden;">${el}${lbl}</div>${cap}</div>`;
}

function hStatRow(b) {
  const lines = (b.items||'').split('\n').filter(l=>l.trim());
  const pairs = [];
  for(let i=0;i<lines.length;i+=2){if(lines[i]&&lines[i+1])pairs.push({val:lines[i],lbl:lines[i+1]});}
  const cols = pairs.map(p=>`<div style="flex:1;min-width:100px;text-align:center;padding:16px 12px;background:rgba(255,140,0,0.05);border:1px solid rgba(255,140,0,0.15);border-radius:12px;"><div style="font-family:'Orbitron',sans-serif;font-size:22px;font-weight:800;color:#ff8c00;">${esc(p.val)}</div><div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;opacity:0.6;margin-top:4px;font-family:'Orbitron',sans-serif;">${esc(p.lbl)}</div></div>`).join('');
  return `<div style="display:flex;gap:12px;flex-wrap:wrap;margin:20px 0;">${cols}</div>`;
}

function hBadgeGroup(b) {
  const C = {
    orange:{bg:'rgba(255,140,0,0.15)',  bdr:'rgba(255,140,0,0.4)',  col:'#ff9a1a'},
    green: {bg:'rgba(72,187,120,0.15)', bdr:'rgba(72,187,120,0.4)', col:'#68d391'},
    blue:  {bg:'rgba(66,153,225,0.15)', bdr:'rgba(66,153,225,0.4)', col:'#63b3ed'},
    red:   {bg:'rgba(255,68,68,0.15)',  bdr:'rgba(255,68,68,0.4)',  col:'#ff7070'},
    purple:{bg:'rgba(159,122,234,0.15)',bdr:'rgba(159,122,234,0.4)',col:'#b794f4'},
  };
  const chips = (b.items||'').split('\n').filter(l=>l.trim()).map(line=>{
    const [txt,col='orange'] = line.split('|');
    const c = C[col.trim()]||C.orange;
    return `<span style="display:inline-block;background:${c.bg};border:1px solid ${c.bdr};color:${c.col};padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;font-family:'Orbitron',sans-serif;letter-spacing:0.3px;">${esc(txt.trim())}</span>`;
  }).join('');
  return `<div style="display:flex;flex-wrap:wrap;gap:6px;margin:16px 0;">${chips}</div>`;
}

function hGallery(b) {
  const items = (b.items||[]).filter(i=>i.url);
  if (!items.length) return `<div style="margin:20px 0;padding:20px;background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.1);border-radius:12px;text-align:center;color:#555;font-size:12px;">No media URLs set — click Edit to add images/GIFs</div>`;
  const cols = Math.min(items.length, parseInt(b.cols)||2);
  const cards = items.map(it => {
    const url = resolveURL(it.url);
    const type = getMediaType(it.url);
    let el;
    if (type==='video') el=`<video src="${url}" controls style="width:100%;border-radius:8px;"></video>`;
    else if (type==='youtube'){const id=getYoutubeId(it.url);el=`<iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:16/9;border-radius:8px;"></iframe>`;}
    else el=`<img src="${url}" alt="${esc(it.caption||'')}" style="width:100%;height:180px;object-fit:cover;border-radius:8px;display:block;" loading="lazy">`;
    const cap = it.caption ? `<div style="font-size:11px;color:#888;margin-top:6px;text-align:center;">${esc(it.caption)}</div>` : '';
    return `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,140,0,0.15);border-radius:10px;overflow:hidden;padding:6px;">${el}${cap}</div>`;
  }).join('');
  return `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:10px;margin:20px 0;">${cards}</div>`;
}

function hStepList(b) {
  const items = (b.items||[]);
  if (!items.length) return '';
  const steps = items.map((it, idx) => {
    const isLast = idx === items.length - 1;
    const conn = !isLast ? `<div style="position:absolute;left:17px;top:36px;bottom:-20px;width:2px;background:linear-gradient(180deg,rgba(255,140,0,0.4),rgba(255,140,0,0.05));"></div>` : '';
    const body = (it.body||'').split('\n').filter(l=>l.trim()).map(l=>`<p style="margin:3px 0;color:#bbb;font-size:13px;">${esc(l)}</p>`).join('');
    return `<div style="display:flex;gap:16px;position:relative;">${conn}<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#ff8c00,#ff6b35);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:800;color:#000;flex-shrink:0;">${idx+1}</div><div style="padding-top:6px;flex:1;"><div style="font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#f0f0f0;margin-bottom:5px;">${esc(it.title||'Step '+(idx+1))}</div>${body}</div></div>`;
  }).join('');
  return `<div style="display:flex;flex-direction:column;gap:20px;margin:20px 0;padding:20px 20px 20px 16px;background:rgba(255,140,0,0.04);border:1px solid rgba(255,140,0,0.15);border-radius:16px;">${steps}</div>`;
}

function hCallout(b) {
  const CMAP = {
    info:    {bg:'rgba(66,153,225,0.08)',  bdr:'rgba(66,153,225,0.3)',  col:'#63b3ed', icon:'lucide:info'},
    warning: {bg:'rgba(255,140,0,0.08)',   bdr:'rgba(255,140,0,0.35)', col:'#ff8c00', icon:'lucide:alert-triangle'},
    danger:  {bg:'rgba(255,68,68,0.08)',   bdr:'rgba(255,68,68,0.35)', col:'#ff5555', icon:'lucide:alert-octagon'},
    success: {bg:'rgba(72,187,120,0.08)',  bdr:'rgba(72,187,120,0.3)', col:'#68d391', icon:'lucide:check-circle'},
    pro:     {bg:'rgba(159,122,234,0.08)', bdr:'rgba(159,122,234,0.3)',col:'#b794f4', icon:'lucide:zap'},
    fire:    {bg:'rgba(255,69,0,0.08)',    bdr:'rgba(255,69,0,0.4)',   col:'#ff4500', icon:'lucide:flame'},
  };
  const c = CMAP[b.variant||'info']||CMAP.info;
  const ic = b.icon||c.icon;
  const titleHtml = b.title ? `<div style="font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:${c.col};margin-bottom:8px;letter-spacing:0.3px;">${esc(b.title)}</div>` : '';
  const body = (b.body||'').split('\n').filter(l=>l.trim()).map(l=>`<p style="margin:4px 0;font-size:14px;color:rgba(230,230,230,0.9);">${esc(l)}</p>`).join('');
  return `<div style="margin:20px 0;padding:18px 22px;background:${c.bg};border:1px solid ${c.bdr};border-left:4px solid ${c.col};border-radius:12px;display:flex;gap:14px;"><div style="flex-shrink:0;margin-top:2px;"><iconify-icon icon="${ic}" width="22" height="22" style="color:${c.col};"></iconify-icon></div><div style="flex:1;">${titleHtml}${body}</div></div>`;
}

function hLinkBtn(b) {
  const STMAP = {
    primary:  'background:linear-gradient(135deg,#ff8c00,#ff6b35);color:#000;border:none;',
    secondary:'background:transparent;border:1.5px solid rgba(255,140,0,0.5);color:#ff8c00;',
    glow:     'background:linear-gradient(135deg,#ff8c00,#ff6b35);color:#000;border:none;box-shadow:0 0 20px rgba(255,140,0,0.5),0 0 40px rgba(255,140,0,0.2);',
    discord:  'background:#5865F2;color:#fff;border:none;',

    cta:      'background:linear-gradient(135deg,#ff8c00,#ff6b35);color:#000;border:none;width:100%;max-width:480px;padding:14px 40px;font-size:13px;',
  };
  const s = STMAP[b.style]||STMAP.primary;
  const DL = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline-block;vertical-align:middle;margin-right:5px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

// ═══════════════════════════════════════════════
// MARKDOWN GENERATORS
// ═══════════════════════════════════════════════
function blkMD(b) {
  const p = TM[S.tmpl].prefix;
  switch(b.type) {
    case 'section-title':      return mdST(b,p);
    case 'info-section-title': return mdIST(b);
    case 'card':               return mdCard(b,p);
    case 'info-card':          return mdIC(b);
    case 'punish-card':        return mdPunishCard(b);
    case 'tip':                return mdTip(b,p);
    case 'custom-list':        return mdList(b,p);
    case 'info-box':           return mdBox(b,p);
    case 'collapse-group':     return mdCollapse(b);
    case 'divider':            return '\n<div class="wf-info-divider"></div>\n';
    case 'key-row':            return mdKeyRow(b);
    case 'type-grid':          return mdTypeGrid(b);
    case 'stat-row':           return mdStatRow(b);
    case 'badge-group':        return mdBadgeGroup(b);
    case 'price-card':         return mdPriceCard(b,p);
    case 'feature-chips':      return mdFeatureChips(b);
    case 'media':              return mdMedia(b);
    case 'link-button':        return mdLinkBtn(b);
    case 'media-gallery':      return mdGallery(b);
    case 'step-list':          return mdStepList(b);
    case 'callout':            return mdCallout(b);
    default: return '';
  }
}

function mdST(b,p) {
  const t  = (b.title||'Section').toUpperCase();
  const n  = b.num ? b.num+' ' : '';
  const ic = b.icon||'lucide:star';
  return `
### ${n}${t}

<div style="display: flex; align-items: center; gap: 16px; margin: 40px 0 25px 0; padding-bottom: 12px; border-bottom: 2px solid rgba(255,140,0,0.2);" class="${p}-title-hover">
  <span style="font-size: 28px; font-weight: 800; line-height: 1; display: inline-block; background: linear-gradient(135deg, #ff8c00, #ff5500, #ff4400); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;" class="${p}-font"><Icon icon="${ic}" width="30" height="30" color="#ff8c00" style="display: inline-block; vertical-align: middle; margin-right: 8px;" />${n}${t}</span>
</div>
`;
}

function mdIST(b) {
  const t = (b.title||'Section').toUpperCase();
  const n = b.num ? b.num+' ' : '';
  return `
### ${n}${t}

<div class="wf-info-title">
  <svg viewBox="0 0 24 24" fill="none" stroke="#ff8c00" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
  <span>${n}${t}</span>
</div>
`;
}

function mdCardMedia(b) {
  const items = (b.mediaItems && b.mediaItems.length)
    ? b.mediaItems
    : (b.mediaUrl ? [{url:b.mediaUrl, label:b.mediaLabel||'', caption:b.mediaCaption||''}] : []);
  if (!items.length) return '';
  return items.filter(m=>m.url).map(m => {
    const type = getMediaType(m.url);
    const lbl = m.label ? `    <div style="position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-family: 'Orbitron', monospace; color: #ff8c00;">${m.label}</div>` : '';
    const cap = m.caption ? `  <div style="text-align: center; padding: 10px 12px 4px; font-size: 12px; color: var(--vp-c-text-2);">${m.caption}</div>` : '';
    let el;
    if (type==='video') el=`    <video src="${m.url}" controls style="width: 100%; max-width: 800px; height: auto; display: block; margin: 0 auto; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);"></video>`;
    else if (type==='youtube'){const id=getYoutubeId(m.url);el=`    <iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen style="width: 100%; aspect-ratio: 16/9; border-radius: 12px; display: block; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.2);"></iframe>`;}
    else el=`    <img src="${m.url}" alt="${m.label||''}" style="width: 100%; max-width: 800px; height: auto; display: block; margin: 0 auto; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);" loading="lazy">`;
    return `
  <div style="margin: 16px 0; border-radius: 16px; overflow: hidden; background: linear-gradient(135deg, rgba(255,140,0,0.1), rgba(255,140,0,0.02)); border: 1px solid rgba(255,140,0,0.2); padding: 8px;">
    <div style="position: relative; border-radius: 12px; overflow: hidden;">
${el}
${lbl}
    </div>
${cap}
  </div>`;
  }).join('');
}

function mdCard(b,p) {
  const ic    = b.icon||'lucide:info';
  const nm    = b.number ? `\n    <span class="${p}-number">${b.number}</span>` : '';
  const hl    = b.highlight ? ` <span class="${p}-highlight">${b.highlight}</span>` : '';
  const media = mdCardMedia(b);
  const vMap  = {success:' border-color: rgba(0,200,81,0.4);',danger:' border-color: rgba(255,68,68,0.4);',pro:' border-color: rgba(159,122,234,0.4);'};
  const varStyle = vMap[b.variant]||'';
  const styleAttr = varStyle ? ` style="${varStyle.trim()}"` : '';
  const btn   = b.btnText ? `
<div style="margin-top: 12px;">
  <a href="${b.btnUrl||'#'}" target="_blank" style="display: inline-block; background: linear-gradient(135deg, #ff8c00, #ff6b35); color: #000; padding: 7px 18px; border-radius: 6px; font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700; text-decoration: none;">${b.btnText}</a>
</div>` : '';
  const bodyMD = (b.body||'').split('\n').filter(l=>l.trim()).map(l=>`    <p>${l}</p>`).join('\n')||'    <p></p>';
  return `
<div class="${p}-card"${styleAttr}>
  <div class="${p}-icon"><Icon icon="${ic}" width="18" height="18" color="#ff8c00" /></div>
  <div class="${p}-content">${nm}${hl}
${bodyMD}${media}${btn}
  </div>
</div>
`;
}

function mdIC(b) {
  const nm    = b.number ? `<span class="wf-info-number wf-info-font">${b.number}</span> ` : '';
  const media = mdCardMedia(b);
  return `
<div class="wf-info-card">
  <div class="wf-info-icon">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff8c00" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
  </div>
  <div class="wf-info-content">
    ${nm}${b.text||''}${media}
  </div>
</div>
`;
}

function mdTip(b,p) {
  const cls = b.variant ? ` ${b.variant}` : '';
  const col = b.variant==='orange'?'#ff8c00':b.variant==='red'?'#ff4444':'#00c851';
  const ic  = b.icon || (b.variant==='orange'?'lucide:info':b.variant==='red'?'lucide:alert-triangle':'lucide:check-circle');
  return `
<div class="${p}-tip${cls}">
  <Icon icon="${ic}" width="22" height="22" color="${col}" />
  <span>${b.body||''}</span>
</div>
`;
}

function mdList(b,p) {
  const lis = (b.items||'').split('\n').filter(l=>l.trim())
    .map(l=>`  <li><Icon icon="lucide:check" width="18" height="18" color="#ff8c00" /><span>${l}</span></li>`).join('\n');
  return `
<ul class="${p}-custom-list">
${lis}
</ul>
`;
}

function mdBox(b,p) {
  const cls = S.tmpl==='wf-info'?'wf-info-box':`${p}-box`;
  const lis = (b.items||'').split('\n').filter(l=>l.trim())
    .map(l=>`    <li><Icon icon="lucide:info" width="20" height="20" color="currentColor" /><span>${l}</span></li>`).join('\n');
  return `
<div class="${cls}">
  <ul>
${lis}
  </ul>
</div>
`;
}

function mdCollapse(b) {
  const items = (b.items||[]).map(it=>`  <div class="wf-info-collapse-item">
    <div class="wf-info-collapse-header" onclick="this.classList.toggle('active'); this.nextElementSibling.classList.toggle('show');">
      <div class="wf-info-collapse-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
      </div>
      <span class="wf-info-collapse-title">${it.q||''}</span>
      <svg class="wf-info-collapse-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="wf-info-collapse-content">
      <p>${it.a||''}</p>
    </div>
  </div>`).join('\n');
  return `
<div class="wf-info-collapse">
${items}
</div>
`;
}

function genMD() {
  const h = S.hdr, tm = TM[S.tmpl];
  const paths = (h.path||'Home').split(',').map(s=>`'${s.trim()}'`).join(', ');
  const tags  = h.tags.map(t=>`    { text: '${t.text}', component: '${t.col}' }`).join(',\n');
  let md = '';
  md += `<CaseHeader \n  title="${h.title||'New Page'}"\n`;
  if (tags) md += `  :tags="[\n${tags}\n  ]"\n`;
  md += `  :path="[${paths}]"\n`;
  md += `  background="/wallpaper/backgroundwf.webp"\n`;
  md += `  :blur-amount="6"\n`;
  md += `  icon="/icons/wildfire.webp"\n`;
  if (h.pid)   md += `  page-id="${h.pid}"\n`;
  if (h.badge) md += `  badge-text="${h.badge}"\n`;
  if (h.icon)  md += `  badge-icon="${h.icon}"\n`;
  md += `/>\n\n`;
  if (tm.wrapper) md += `<div class="${tm.wrapper}">\n\n`;
  md += S.blocks.map(blkMD).join('');
  if (tm.wrapper) md += `\n</div>\n`;
  return md;
}

// ═══════════════════════════════════════════════
// MD → BLOCKS PARSER (reverse of genMD + blkMD)
// ═══════════════════════════════════════════════
function parseMDtoBlocks(src) {
  try { return _parseMDtoBlocks(src); } catch(e) { console.error('[parseMD] Error:', e); return []; }
}
function _parseMDtoBlocks(src) {
  let md = src.replace(/^---[\s\S]*?---\s*\n?/, '');

  // ── Parse CaseHeader ──
  const chM = md.match(/<CaseHeader\s[\s\S]*?\/>/);
  if (chM) {
    const ch = chM[0];
    const ga = (a,d='') => { const r = ch.match(new RegExp(a+'="([^"]*)"')); return r?r[1]:d; };
    S.hdr.title = ga('title','New Page');
    S.hdr.badge = ga('badge-text','');
    S.hdr.icon  = ga('badge-icon','lucide:star');
    S.hdr.pid   = ga('page-id','');
    const pm = ch.match(/:path="\[([^\]]*)\]"/);
    if (pm) S.hdr.path = pm[1].replace(/'/g,'').split(',').map(s=>s.trim()).join(', ');
    S.hdr.tags = [...ch.matchAll(/text:\s*'([^']+)',\s*component:\s*'([^']+)'/g)].map(t=>({text:t[1],col:t[2]}));
    md = md.replace(/<CaseHeader\s[\s\S]*?\/>[\s\n]*/, '');
  }

  // ── Auto-detect template ──
  if (md.includes('wf-info-title') || md.includes('wf-info-card') || md.includes('wf-info-box')) S.tmpl = 'wf-info';
  else if (md.includes('wf-market-card') || md.includes('wf-market-tip') || md.includes('wf-market-title')) S.tmpl = 'wf-market';
  else if (md.includes('wf-system-card') || md.includes('wf-system-tip') || md.includes('wf-system-title')) S.tmpl = 'wf-system';

  const p = TM[S.tmpl].prefix;
  const w = TM[S.tmpl].wrapper;
  if (w) { const wr = md.match(new RegExp('<div class="'+w+'">[\\s\\n]*([\\s\\S]*)[\\s\\n]*<\\/div>\\s*$')); if (wr) md = wr[1]; }

  const finds = [];
  const tx = h => (h||'').replace(/<[^>]*>/g,'').trim();

  // Helper: find matching </div> accounting for nesting
  function closeDiv(startAfter) {
    let d=1, i=startAfter;
    while (i < md.length && d > 0) {
      const o = md.indexOf('<div', i), c = md.indexOf('</div>', i);
      if (c === -1) break;
      if (o !== -1 && o < c) { d++; i = o + 4; }
      else { d--; if (d===0) return c + 6; i = c + 6; }
    }
    return md.length;
  }

  // Helper: scan with simple regex (no nesting issues)
  function scan(re, type, fn) {
    for (const m of md.matchAll(re)) {
      const b = fn(m);
      if (b) finds.push({pos:m.index, end:m.index+m[0].length, block:{id:uid(),type,...b}});
    }
  }

  // Helper: scan blocks that need nesting-aware end detection
  function scanNested(re, type, fn) {
    for (const m of md.matchAll(re)) {
      const end = closeDiv(m.index + m[0].length);
      const inner = md.slice(m.index, end);
      const b = fn(m, inner);
      if (b) finds.push({pos:m.index, end, block:{id:uid(),type,...b}});
    }
  }

  // ── DIVIDER ──
  scan(/<div class="wf-info-divider"><\/div>/g, 'divider', ()=>({}));

  // ── INFO-SECTION-TITLE ──
  scan(/###\s*([\d.]*)\s*(.*?)\n[\s\S]*?<div class="wf-info-title">[\s\S]*?<span>([\s\S]*?)<\/span>\s*<\/div>/g,
    'info-section-title', m => {
      const t = tx(m[3]); const nm = t.match(/^([\d.]+)\s+(.*)/);
      return nm ? {num:nm[1],title:nm[2]} : {num:m[1]||'',title:m[2]||t};
    });

  // ── SECTION-TITLE (wf-system / wf-market) ──
  if (p !== 'wf-info') {
    const stRe = new RegExp('###\\s*([\\d.]*)\\s*(.*?)\\n[\\s\\S]*?class="[^"]*'+p+'-title-hover"[\\s\\S]*?<\\/div>','g');
    scan(stRe, 'section-title', m => {
      const ic = (m[0].match(/<Icon\s+icon="([^"]*)"/) || [])[1] || 'lucide:star';
      return {num:m[1].trim(),title:m[2].trim(),icon:ic};
    });
  }

  // ── COLLAPSE-GROUP ──
  scanNested(/<div class="wf-info-collapse">/g, 'collapse-group', (_,inner) => {
    const items = [];
    for (const tm of inner.matchAll(/<span class="wf-info-collapse-title">([\s\S]*?)<\/span>/g)) {
      const after = inner.slice(tm.index);
      const am = after.match(/<div class="wf-info-collapse-content">\s*<p>([\s\S]*?)<\/p>/);
      items.push({q:tx(tm[1]), a:am?tx(am[1]):''});
    }
    return {items};
  });

  // ── TIP ──
  {
    const tipRe = new RegExp('<div class="'+p+'-tip([^"]*)">[\\s\\S]*?<\\/div>','g');
    scan(tipRe, 'tip', m => {
      const variant = (m[1]||'').trim();
      const ic = (m[0].match(/<Icon\s+icon="([^"]*)"/) || [])[1] || '';
      const body = (m[0].match(/<span>([\s\S]*?)<\/span>/) || [])[1] || '';
      return {variant,icon:ic,body:body.trim()};
    });
  }

  // ── CUSTOM-LIST ──
  {
    const clRe = new RegExp('<ul class="'+p+'-custom-list">[\\s\\S]*?<\\/ul>','g');
    scan(clRe, 'custom-list', m => {
      const items = [...m[0].matchAll(/<li>[\s\S]*?<span>([\s\S]*?)<\/span>\s*<\/li>/g)].map(x=>x[1].trim());
      return {items:items.join('\n')};
    });
  }

  // ── INFO-BOX / BOX ──
  {
    const cls = S.tmpl==='wf-info'?'wf-info-box':p+'-box';
    const bxRe = new RegExp('<div class="'+cls+'">[\\s\\S]*?<\\/ul>\\s*<\\/div>','g');
    scan(bxRe, 'info-box', m => {
      const items = [...m[0].matchAll(/<span>([\s\S]*?)<\/span>/g)].map(x=>x[1].trim());
      return {items:items.join('\n')};
    });
  }

  // ── KEY-ROW ──
  {
    const krRe = new RegExp('<div class="'+p+'-key-row">[\\s\\S]*?<\\/div>','g');
    scan(krRe, 'key-row', m => {
      const lm = m[0].match(/color: #999[^>]*>([\s\S]*?):<\/span>/);
      const keys = [...m[0].matchAll(new RegExp(p+'-key-button">(.*?)<\\/span>','g'))].map(x=>x[1]);
      return {label:lm?lm[1].trim():'', keys:keys.join(', ')};
    });
  }

  // ── TYPE-GRID ──
  {
    const tgOpen = new RegExp('<div class="'+p+'-type-grid">','g');
    scanNested(tgOpen, 'type-grid', (_,inner) => {
      const items = [];
      for (const nm of inner.matchAll(new RegExp(p+'-type-name">(.*?)<\\/span>','g'))) {
        const dm = inner.slice(nm.index).match(/<p>([\s\S]*?)<\/p>/);
        items.push({name:nm[1].trim(), desc:dm?dm[1].trim():''});
      }
      return {items};
    });
  }

  // ── FEATURE-CHIPS ──
  scan(/<div class="wf-currency-features">([\s\S]*?)<\/div>/g, 'feature-chips', m => {
    const items = [...m[1].matchAll(/<span class="wf-currency-feature">[\s\S]*?<\/[\w-]+>([\s\S]*?)<\/span>/g)].map(x=>x[1].trim());
    return {items:items.join('\n')};
  });

  // ── PUNISH-CARD vs INFO-CARD ──
  scanNested(/<div class="wf-info-card">/g, (p==='wf-info'?'info-card':'info-card'), (m,inner) => {
    if (inner.includes('wf-info-punish')) {
      const num = (inner.match(/wf-info-number wf-info-font">(.*?)<\/span>/) || [])[1] || '';
      const badges = [...inner.matchAll(/wf-info-badge wf-info-font">(.*?)<\/span>/g)].map(x=>x[1]);
      const punishments = [...inner.matchAll(/wf-info-punish wf-info-font">(.*?)<\/span>/g)].map(x=>x[1]);
      const cm = inner.match(/wf-info-content">([\s\S]*?)(?:<div style|<\/div>\s*$)/);
      let text = cm ? tx(cm[1]) : '';
      if (num) text = text.replace(num,'').trim();
      return {__type:'punish-card', number:num, text, badges:badges.join(', '), punishments:punishments.join(', ')};
    } else {
      const num = (inner.match(/wf-info-number wf-info-font">(.*?)<\/span>/) || [])[1] || '';
      const cm = inner.match(/wf-info-content">\s*([\s\S]*?)\s*<\/div>/);
      let text = cm ? tx(cm[1]) : '';
      if (num) text = text.replace(num,'').trim();
      const mu = (inner.match(/<(?:img|video|iframe)\s+src="([^"]*)"/) || [])[1] || '';
      const mlbl = (inner.match(/color: #ff8c00;">([\s\S]*?)<\/div>/) || [])[1] || '';
      const mcap = (inner.match(/color: var\(--vp-c-text-2\);">([\s\S]*?)<\/div>/) || [])[1] || '';
      return {number:num, text, mediaUrl:mu, mediaLabel:mlbl.trim(), mediaCaption:mcap.trim()};
    }
  });

  // ── CARD (wf-system/wf-market) — must detect price-card vs regular ──
  if (p !== 'wf-info') {
    const cardOpen = new RegExp('<div class="'+p+'-card"','g');
    scanNested(cardOpen, 'card', (m,inner) => {
      // price-card detection
      if (inner.includes('text-align: center') && inner.match(/font-size:\s*30px/)) {
        const pm = inner.match(/font-size: 30px[^>]*>([\d.,]+)\s*<span[^>]*>(.*?)<\/span>/);
        const nm = inner.match(new RegExp(p+'-highlight"[^>]*>(.*?)<\\/span>'));
        const dm = inner.match(/<p style="margin-top: 8px;">([\s\S]*?)<\/p>/);
        const feats = [...inner.matchAll(/lucide:check"[^/]*\/>([\s\S]*?)<\/span>/g)].map(x=>x[1].trim());
        return {__type:'price-card', price:pm?pm[1]:'0', currency:pm?pm[2].trim():'EUR', name:nm?nm[1]:'', desc:dm?dm[1]:'', features:feats.join('\n')};
      }
      // regular card
      const ic = (inner.match(/<Icon\s+icon="([^"]*)"/) || [])[1] || 'lucide:info';
      const num = (inner.match(new RegExp(p+'-number">(.*?)<\\/span>')) || [])[1] || '';
      const hl = (inner.match(new RegExp(p+'-highlight">(.*?)<\\/span>')) || [])[1] || '';
      const body = [...inner.matchAll(/<p>([\s\S]*?)<\/p>/g)].map(x=>x[1].trim()).join('\n');
      let variant = '';
      const vm = inner.match(/border-color:\s*rgba\((\d+),\s*(\d+),\s*(\d+)/);
      if (vm) { const r=+vm[1],g=+vm[2],b=+vm[3]; if(r===0&&g===200)variant='success';else if(r===255&&g===68)variant='danger';else if(r===159&&g===122)variant='pro'; }
      const btn = inner.match(/<a href="([^"]*)"[^>]*style="[^"]*Orbitron[^"]*"[^>]*>([\s\S]*?)<\/a>/);
      // Extract embedded media items from card
      const mediaItems = [];
      for (const mm of inner.matchAll(/<(?:img|video|iframe)\s+src="([^"]*)"/g)) {
        const mUrl = mm[1];
        // Find label/caption near this media
        const mBlock = inner.slice(mm.index - 200 < 0 ? 0 : mm.index - 200, mm.index + 600);
        const lbl = (mBlock.match(/color: #ff8c00;">([\s\S]*?)<\/div>/) || [])[1] || '';
        const cap = (mBlock.match(/color: var\(--vp-c-text-2\);">([\s\S]*?)<\/div>/) || [])[1] || '';
        mediaItems.push({url: mUrl, label: lbl.trim(), caption: cap.trim()});
      }
      return {icon:ic, number:num, highlight:hl, body, variant, mediaItems, btnText:btn?tx(btn[2]):'', btnUrl:btn?btn[1]:''};
    });
  }

  // ── STAT-ROW ──
  scanNested(/<div style="display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0;">/g, 'stat-row', (_,inner) => {
    const vals = [...inner.matchAll(/font-size: 22px[^>]*>([\s\S]*?)<\/div>/g)].map(x=>tx(x[1]));
    const lbls = [...inner.matchAll(/letter-spacing: 0\.5px[^>]*>([\s\S]*?)<\/div>/g)].map(x=>tx(x[1]));
    const lines = []; for (let i=0;i<vals.length;i++) { lines.push(vals[i]); lines.push(lbls[i]||''); }
    return {items:lines.join('\n')};
  });

  // ── BADGE-GROUP ──
  scanNested(/<div style="display: flex; flex-wrap: wrap; gap: 6px; margin: 16px 0;">/g, 'badge-group', (_,inner) => {
    const items = [...inner.matchAll(/color:\s*([^;]*);[^"]*">([\s\S]*?)<\/span>/g)].map(x => {
      const c=x[1].trim(); let n='orange';
      if(c==='#68d391')n='green';else if(c==='#63b3ed')n='blue';else if(c==='#ff7070')n='red';else if(c==='#b794f4')n='purple';
      return tx(x[2])+'|'+n;
    });
    return {items:items.join('\n')};
  });

  // ── MEDIA-GALLERY ──
  scanNested(/<div style="display: grid; grid-template-columns: repeat\((\d+)/g, 'media-gallery', (m,inner) => {
    const cols = parseInt(m[1])||2;
    const items = [];
    // Each gallery item is in a grid child div with border-radius: 10px
    for (const gm of inner.matchAll(/<(?:img|video|iframe)\s+src="([^"]*)"/g)) {
      const zone = inner.slice(gm.index, gm.index + 400);
      const cap = (zone.match(/text-align: center;">([\s\S]*?)<\/div>/) || [])[1] || '';
      items.push({url: gm[1], caption: cap.trim()});
    }
    return {cols, items};
  });

  // ── STEP-LIST ──
  scanNested(/<div style="display: flex; flex-direction: column; gap: 20px;[^"]*background: rgba\(255,140,0/g, 'step-list', (_,inner) => {
    const items = [];
    for (const tm of inner.matchAll(/font-family: 'Orbitron'[^>]*font-weight: 700[^>]*>([\s\S]*?)<\/div>/g)) {
      const title = tm[1].trim();
      const after = inner.slice(tm.index + tm[0].length);
      const nextT = after.search(/font-family: 'Orbitron'[^>]*font-weight: 700/);
      const bodyZone = nextT===-1 ? after : after.slice(0, nextT);
      const body = [...bodyZone.matchAll(/<p[^>]*>([\s\S]*?)<\/p>/g)].map(x=>x[1].trim()).join('\n');
      items.push({title,body});
    }
    return {items};
  });

  // ── CALLOUT ──
  scanNested(/<div style="margin: 20px 0; padding: 18px 22px;/g, 'callout', (_,inner) => {
    if (!inner.includes('border-left: 4px solid')) return null;
    const cm = inner.match(/border-left: 4px solid ([^;]+)/);
    let variant='info';
    if(cm){const c=cm[1];if(c.includes('66,153,225'))variant='info';else if(c.includes('255,140,0'))variant='warning';else if(c.includes('255,68,68'))variant='danger';else if(c.includes('72,187,120'))variant='success';else if(c.includes('159,122,234'))variant='pro';else if(c.includes('255,69,0'))variant='fire';}
    const ic = (inner.match(/<Icon\s+icon="([^"]*)"/) || [])[1] || '';
    const titleM = inner.match(/letter-spacing: 0\.3px;">([\s\S]*?)<\/div>/);
    const body = [...inner.matchAll(/<p style="margin: 4px 0[^>]*>([\s\S]*?)<\/p>/g)].map(x=>x[1].trim()).join('\n');
    return {variant, icon:ic, title:titleM?titleM[1].trim():'', body};
  });

  // ── MEDIA (standalone image/video) ──
  scanNested(/<div style="margin: 24px 0; border-radius: 16px;/g, 'media', (_,inner) => {
    const url = (inner.match(/<(?:img|video|iframe)\s+src="([^"]*)"/) || [])[1] || '';
    const alt = (inner.match(/alt="([^"]*)"/) || [])[1] || '';
    const label = (inner.match(/color: #ff8c00;">([\s\S]*?)<\/div>/) || [])[1] || '';
    const caption = (inner.match(/color: var\(--vp-c-text-2\);">([\s\S]*?)<\/div>/) || [])[1] || '';
    return {url,alt,label:label.trim(),caption:caption.trim(),linkText:''};
  });

  // ── LINK-BUTTON ──
  scan(/<div style="text-align: center; margin: 16px 0;">\s*\n\s*<a href="([^"]*)"[^>]*style="([^"]*)"[^>]*>([\s\S]*?)<\/a>\s*\n\s*<\/div>/g,
    'link-button', m => {
      const text=tx(m[3]), s=m[2]; let style='primary';
      if(s.includes('#5865F2'))style='discord';else if(s.includes('#00c851')||s.includes('#00a844'))style='download';
      else if(s.includes('box-shadow')&&s.includes('40px'))style='glow';else if(s.includes('width: 100%'))style='cta';
      else if(s.includes('1.5px solid'))style='secondary';
      return {text,url:m[1],style};
    });

  // ── Sort by position, deduplicate overlaps ──
  finds.sort((a,b) => a.pos - b.pos);
  const result = []; let lastEnd = 0;
  for (const f of finds) {
    if (f.pos >= lastEnd) {
      if (f.block.__type) { f.block.type = f.block.__type; delete f.block.__type; }
      result.push(f.block);
      lastEnd = f.end;
    }
  }
  console.log('[parseMD] Found', result.length, 'blocks:', result.map(b=>b.type));
  return result;
}

function mdKeyRow(b) {
  const keys = (b.keys||'').split(',').map(k=>k.trim()).filter(Boolean);
  const p = TM[S.tmpl].prefix;
  const label = b.label ? `<span style="font-size: 12px; color: #999; margin-right: 10px;">${b.label}:</span>` : '';
  const keyHtml = keys.map(k=>`<span class="${p}-key-button">${k}</span>`).join('');
  return `\n<div class="${p}-key-row"><span class="${p}-key-item">${label}${keyHtml}</span></div>\n`;
}

function mdTypeGrid(b) {
  const p = TM[S.tmpl].prefix;
  const cards = (b.items||[]).map(it=>`  <div class="${p}-type-card"><span class="${p}-type-name">${it.name||''}</span><p>${it.desc||''}</p></div>`).join('\n');
  return `\n<div class="${p}-type-grid">\n${cards}\n</div>\n`;
}

function mdPriceCard(b,p) {
  const feats = (b.features||'').split('\n').filter(l=>l.trim());
  const featMD = feats.length ? `\n    <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">${feats.map(f=>`\n      <span style="display: flex; align-items: center; gap: 6px; font-size: 12px;"><Icon icon="lucide:check" width="13" height="13" color="#ff8c00" />${f}</span>`).join('')}\n    </div>` : '';
  return `\n<div class="${p}-card" style="text-align: center;">
  <div class="${p}-content" style="width: 100%;">
    <div style="font-family: 'Orbitron', sans-serif; font-size: 30px; font-weight: 800; color: #ff8c00; margin-bottom: 4px;">${b.price||'0'} <span style="font-size: 16px; opacity: 0.7;">${b.currency||'EUR'}</span></div>
    <span class="${p}-highlight" style="font-size: 16px;">${b.name||'Package'}</span>
    <p style="margin-top: 8px;">${b.desc||''}</p>${featMD}
  </div>
</div>\n`;
}

function mdFeatureChips(b) {
  const items = (b.items||'').split('\n').filter(l=>l.trim());
  const chips = items.map(l=>`  <span class="wf-currency-feature"><Icon icon="lucide:check" width="12" height="12" />${l}</span>`).join('\n');
  return `\n<div class="wf-currency-features">\n${chips}\n</div>\n`;
}

function mdPunishCard(b) {
  const punishments = (b.punishments||'').split(',').map(p=>p.trim()).filter(Boolean);
  const badges      = (b.badges||'').split(',').map(p=>p.trim()).filter(Boolean);
  const punMD   = punishments.map(p=>`<span class="wf-info-punish wf-info-font">${p}</span>`).join(' ');
  const badgeMD = badges.map(p=>`<span class="wf-info-badge wf-info-font">${p}</span>`).join(' ');
  const num = b.number ? `<span class="wf-info-number wf-info-font">${b.number}</span> ` : '';
  return `\n<div class="wf-info-card">
  <div class="wf-info-icon">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff8c00" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
  </div>
  <div class="wf-info-content">
    ${num}${b.text||''}
    <div style="margin-top: 6px; display: flex; flex-wrap: wrap; gap: 5px;">${badgeMD}${punMD}</div>
  </div>
</div>\n`;
}

function mdMedia(b) {
  const url  = b.url||'';
  if (!url) return '';
  const type = getMediaType(url);
  const lbl  = b.label ? `    <div style="position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-family: 'Orbitron', monospace; color: #ff8c00;">${b.label}</div>` : '';
  const cap  = b.caption ? `  <div style="text-align: center; padding: 10px 12px 4px; font-size: 12px; color: var(--vp-c-text-2);">${b.caption}</div>` : '';
  if (type==='link') return `\n<div style="margin: 20px 0; padding: 16px; background: rgba(255,140,0,0.06); border: 1px solid rgba(255,140,0,0.25); border-radius: 12px; text-align: center;">\n  <a href="${url}" target="_blank" style="color: #ff8c00; font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700; text-decoration: none;">${b.linkText||url}</a>\n</div>\n`;
  let el;
  if (type==='video') el=`  <video src="${url}" controls style="width: 100%; max-width: 800px; height: auto; display: block; margin: 0 auto; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);"></video>`;
  else if (type==='youtube'){const id=getYoutubeId(url);el=`  <iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen style="width: 100%; aspect-ratio: 16/9; border-radius: 12px; display: block; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.2);"></iframe>`;}
  else el=`  <img src="${url}" alt="${b.alt||b.label||''}" style="width: 100%; max-width: 800px; height: auto; display: block; margin: 0 auto; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);" loading="lazy">`;
  return `\n<div style="margin: 24px 0; border-radius: 16px; overflow: hidden; background: linear-gradient(135deg, rgba(255,140,0,0.1), rgba(255,140,0,0.02)); border: 1px solid rgba(255,140,0,0.2); padding: 8px;">\n  <div style="position: relative; border-radius: 12px; overflow: hidden;">\n${el}\n${lbl}\n  </div>\n${cap}\n</div>\n`;
}

function mdStatRow(b) {
  const lines = (b.items||'').split('\n').filter(l=>l.trim());

  return `\n<div style="display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0;">\n${cols}\n</div>\n`;

function mdBadgeGroup(b) {

    green: {bg:'rgba(72,187,120,0.15)', bdr:'rgba(72,187,120,0.4)', col:'#68d391'},

function mdGallery(b) {
  const items = (b.items||[]).filter(i=>i.url);
  if (!items.length) return '';
  const cols = Math.min(items.length, parseInt(b.cols)||2);
  const imgEls = items.map(it => {
    const type = getMediaType(it.url);
    let el;
    if (type==='video') el=`  <video src="${it.url}" controls style="width: 100%; border-radius: 8px;"></video>`;
    else if (type==='youtube'){const id=getYoutubeId(it.url);el=`  <iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen style="width: 100%; aspect-ratio: 16/9; border-radius: 8px;"></iframe>`;}
    else el=`  <img src="${it.url}" alt="${it.caption||''}" style="width: 100%; height: 180px; object-fit: cover; border-radius: 8px; display: block;" loading="lazy">`;
    const cap = it.caption ? `\n  <div style="font-size: 11px; color: var(--vp-c-text-2); margin-top: 6px; text-align: center;">${it.caption}</div>` : '';

let _prevDebounce = null;
function schedulePreview() {
  clearTimeout(_prevDebounce);
  _prevDebounce = setTimeout(updatePreview, 380);
