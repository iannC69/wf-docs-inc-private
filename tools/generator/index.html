function rawMDtoPreviewHTML(src) {
  let html = src.replace(/^---[\s\S]*?---\s*\n?/, '');
  // CaseHeader → preview header
  html = html.replace(/<CaseHeader\b[\s\S]*?\/>/g, m => {
    const ga = (a, d='') => { const r = m.match(new RegExp(a+'="([^"]*)"')); return r ? r[1] : d; };
    const pathM = m.match(/:path="\[([^\]]*)\]"/);
    const path  = pathM ? pathM[1].replace(/'/g,'').split(',').map(s=>s.trim()).join(', ') : 'Home';
    const tagsM = [...m.matchAll(/text:\s*'([^']+)',\s*component:\s*'([^']+)'/g)];
    const saved = JSON.parse(JSON.stringify(S.hdr));
    S.hdr = { title: ga('title','Page'), badge: ga('badge-text',''), icon: ga('badge-icon','lucide:star'), pid: ga('page-id',''), path, tags: tagsM.map(t=>({text:t[1],col:t[2]})), blurAmount: 6 };
    const h = buildCaseHeaderHTML();
    S.hdr = saved;
    return h;
  });
  // <Icon> → <iconify-icon> (merge color + style into one style attr)
  html = html.replace(/<Icon\b([^>]*?)\s*\/>/g, (_, a) => {
    const g = (k, d) => { const r = a.match(new RegExp(k+'="([^"]*?)"')); return r ? r[1] : d; };
    const color = g('color',''); const sty = g('style','');
    let style = '';
    if (color) style += 'color:'+color+';';
    if (sty) style += sty;
    return `<iconify-icon icon="${g('icon','')}" width="${g('width','18')}" height="${g('height','18')}"${style?' style="'+style+'"':''}></iconify-icon>`;
  });
  // Resolve local asset paths (src="/...", src='/...') to base URL
  html = html.replace(/(src=["'])\/(?!\/)/g, '$1' + BASE_URL + '/');
  // Markdown headings
  html = html.replace(/^### (.+)$/gm,'<h3 style="margin:16px 0 8px">$1</h3>')
             .replace(/^## (.+)$/gm,'<h2 style="margin:20px 0 10px">$1</h2>')
             .replace(/^# (.+)$/gm,'<h1 style="margin:24px 0 12px">$1</h1>');
  return html;
}

  if (_mdLocked) {

    list.innerHTML = S.blocks.map((b,i) => {
      const mv = (i>0 ? `<button class="bi" onclick="mvBlk('${b.id}','up')" title="Up">↑</button>` : '') +

      return `<div class="blk" data-t="${b.type}">
        <span class="blk-badge">${b.type.replace(/-/g,'·')}</span>
        <span class="blk-txt">${blkPreview(b)}</span>
        <div class="blk-acts">${mv}
          <button class="bi" onclick="dupBlk('${b.id}')" title="Duplicate">⧉</button>
          <button class="bi" onclick="editBlk('${b.id}')" title="Edit">✏</button>
          <button class="bi del" onclick="delBlk('${b.id}')" title="Delete">✕</button>
        </div></div>`;
    }).join('');
  }

  rebuildDD();
  saveLocal();
}

function blkPreview(b) {
  switch(b.type) {
    case 'section-title':
    case 'info-section-title': return esc(`${b.num||''} ${b.title||''}`.trim());
    case 'card':               return esc(b.highlight||b.body||'');
    case 'info-card':          return esc(`${b.number||''} ${b.text||''}`.trim());
    case 'tip':                return esc(b.body||'');
    case 'custom-list':
    case 'info-box':           return esc((b.items||'').split('\n')[0]||'');
    case 'collapse-group':     return esc(b.items?.[0]?.q||'FAQ group');
    case 'divider':            return '── divider ──';
    case 'key-row':            return esc(`${b.label||''}: ${b.keys||''}`);
    case 'type-grid':          return esc(b.items?.[0]?.name||'type grid');
    case 'price-card':         return esc(`${b.price||'0'} ${b.currency||'EUR'} — ${b.name||''}`);
    case 'feature-chips':      return esc((b.items||'').split('\n')[0]||'');
    case 'punish-card':        return esc(`${b.number||''} ${b.text||''}`.trim());
    case 'media':              return esc(b.url ? `[${getMediaType(b.url)}] ${b.url.split('/').pop()}` : 'no url set');
    case 'link-button':        return esc(`${b.text||'Link'} → ${b.url||''}`);
    case 'media-gallery':      return esc(`${(b.items||[]).filter(i=>i.url).length} image${(b.items||[]).filter(i=>i.url).length!==1?'s':''} · ${b.cols||2}-col`);
    case 'step-list':          return esc(b.items?.[0]?.title || `${(b.items||[]).length} steps`);
    case 'callout':            return esc(`[${b.variant||'info'}] ${b.title||b.body?.substring(0,40)||''}`);
    default: return b.type;
  }
}

// BLOCK CRUD

function addBlk(type) {
  S.blocks.push(defBlock(type));
  toggleDD(false);
  _mdLocked = false;
  render();
}

function delBlk(id) {
  S.blocks = S.blocks.filter(b=>b.id!==id);
  _mdLocked = false;
  render();
}

function mvBlk(id, dir) {
  const i = S.blocks.findIndex(b=>b.id===id);
  if (i<0) return;
  if (dir==='up'  && i>0)               [S.blocks[i],S.blocks[i-1]]=[S.blocks[i-1],S.blocks[i]];
  if (dir==='dn'  && i<S.blocks.length-1) [S.blocks[i],S.blocks[i+1]]=[S.blocks[i+1],S.blocks[i]];
  _mdLocked = false;
  render();
}

function dupBlk(id) {
  const i = S.blocks.findIndex(b=>b.id===id);
  if (i<0) return;
  const clone = JSON.parse(JSON.stringify(S.blocks[i]));
  clone.id = uid();
  S.blocks.splice(i+1, 0, clone);
  _mdLocked = false;
  render();
}

function clearAll() {
  if (!S.blocks.length) return;
  if (!confirm(`Clear all ${S.blocks.length} block${S.blocks.length!==1?'s':''}?`)) return;
  S.blocks = [];
  _mdLocked = false;
  render();
}

function syncForm() {
  document.getElementById('f-title').value = S.hdr.title||'';
  document.getElementById('f-badge').value = S.hdr.badge||'';
  document.getElementById('f-icon').value  = S.hdr.icon||'lucide:star';
  document.getElementById('f-pid').value   = S.hdr.pid||'';
  document.getElementById('f-path').value  = S.hdr.path||TM[S.tmpl].defPath;
  document.querySelectorAll('.ttab').forEach(el=>el.classList.toggle('on',el.dataset.t===S.tmpl));

}

function exportState() {
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `wfgen-${S.hdr.pid||'project'}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('Exported ✓');
}

function importState() { document.getElementById('imp-file').click(); }

function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.hdr || !Array.isArray(data.blocks)) throw new Error();
      Object.assign(S, data);
      _id = S.blocks.length ? Math.max(...S.blocks.map(b=>parseInt(b.id)||0)) + 1 : _id;
      syncForm(); render(); toast('Imported ✓');
    } catch { toast('Invalid JSON file', true); }
  };
  r.readAsText(file); e.target.value = '';
}

const field = (id,lbl,val,ph='')=>
  `<div class="mf"><label>${lbl}</label><input type="text" id="mf-${id}" value="${esc(val||'')}" placeholder="${ph}"></div>`;

  `<div class="mf"><label>${lbl}</label><textarea id="mf-${id}" rows="4">${val||''}</textarea></div>`;
const sel = (id,lbl,val,opts)=>
  `<div class="mf"><label>${lbl}</label><select id="mf-${id}">${opts.map(o=>`<option value="${o.v}"${o.v===val?' selected':''}>${o.l}</option>`).join('')}</select></div>`;

           + field('mediaLabel','Watermark label',b.mediaLabel)

    case 'tip':

    case 'custom-list': return area('items','Items (one per line)',b.items);

      return `<div id="steps-c">${steps}</div><button class="btn sec" onclick="addStepItem()" style="width:100%;margin-top:6px;font-size:10px">+ ADD STEP</button>`;

           + field('icon','Custom Icon — lucide:xxx (blank = auto from variant)',b.icon||'')
           + field('title','Title (optional)',b.title||'')
           + area('body','Body content — multi-line supported',b.body);
    default: return '';
  }
}

function buildCardMediaFields(b) {
  const items = (b.mediaItems && b.mediaItems.length)
    ? b.mediaItems
    : (b.mediaUrl ? [{url:b.mediaUrl, label:b.mediaLabel||'', caption:b.mediaCaption||''}] : []);
  const rows = items.map((m,idx)=>`
    <div class="faq-pair"><div class="faq-pair-hd"><span>Media #${idx+1}</span><button class="bi del" onclick="rmCardMedia(${idx})">&#10005;</button></div>
      <input type="text" id="mf-cm-url-${idx}" value="${esc(m.url||'')}" placeholder="/img/photo.gif or https://..." style="margin-bottom:5px">
      <input type="text" id="mf-cm-lbl-${idx}" value="${esc(m.label||'')}" placeholder="Watermark label (optional)" style="margin-bottom:5px">
      <input type="text" id="mf-cm-cap-${idx}" value="${esc(m.caption||'')}" placeholder="Caption below (optional)"></div>`).join('');
  return `<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);"><label style="font-size:10px;letter-spacing:1px;opacity:0.45;text-transform:uppercase;">Inline Media (add as many as needed)</label></div><div id="card-media-c">${rows}</div><button class="btn sec" onclick="addCardMedia()" style="width:100%;margin-top:6px;font-size:10px">+ ADD MEDIA</button>`;
}

function saveModal() {
  const b = S.blocks.find(x=>x.id===editId);
  if (!b) { closeModal(); return; }
  const v = id => { const el=document.getElementById(`mf-${id}`); return el?el.value:''; };
  switch(b.type) {
    case 'section-title':      b.num=v('num');b.title=v('title');b.icon=v('icon');break;
    case 'info-section-title': b.num=v('num');b.title=v('title');break;
    case 'card': {
      b.icon=v('icon');b.variant=v('variant');b.number=v('number');b.highlight=v('highlight');b.body=v('body');b.btnText=v('btnText');b.btnUrl=v('btnUrl');
      const cmItems=[];let ci=0;
      while(true){const ue=document.getElementById(`mf-cm-url-${ci}`);if(!ue)break;
        cmItems.push({url:ue.value,label:(document.getElementById(`mf-cm-lbl-${ci}`)||{}).value||'',caption:(document.getElementById(`mf-cm-cap-${ci}`)||{}).value||''});ci++;}
      b.mediaItems=cmItems.filter(m=>m.url||m.label||m.caption);b.mediaUrl='';break;
    }
    case 'info-card':          b.number=v('number');b.text=v('text');b.mediaUrl=v('mediaUrl');b.mediaLabel=v('mediaLabel');b.mediaCaption=v('mediaCaption');break;
    case 'tip':                b.variant=v('variant');b.icon=v('icon');b.body=v('body');break;
    case 'custom-list':        b.items=v('items');break;
    case 'info-box':           b.items=v('items');break;
    case 'collapse-group': {
      const items=[]; let i=0;
      while(true){ const qe=document.getElementById(`mf-fq-${i}`); if(!qe)break;
        items.push({q:qe.value,a:(document.getElementById(`mf-fa-${i}`)||{}).value||''}); i++; }
      b.items=items; break;
    }
    case 'key-row':       b.label=v('label');b.keys=v('keys');break;
    case 'type-grid': {
      const tgItems=[];let ti=0;
      while(true){const ne=document.getElementById(`mf-tg-name-${ti}`);if(!ne)break;
        tgItems.push({name:ne.value,desc:(document.getElementById(`mf-tg-desc-${ti}`)||{}).value||''});ti++;}
      b.items=tgItems;break;
    }
    case 'price-card':    b.name=v('name');b.price=v('price');b.currency=v('currency');b.desc=v('desc');b.features=v('features');break;
    case 'feature-chips': b.items=v('items');break;
    case 'stat-row':      b.items=v('items');break;
    case 'badge-group':   b.items=v('items');break;
    case 'punish-card':   b.number=v('number');b.text=v('text');b.badges=v('badges');b.punishments=v('punishments');break;
    case 'media':         b.url=v('url');b.alt=v('alt');b.label=v('label');b.caption=v('caption');b.linkText=v('linkText');break;
    case 'link-button':   b.text=v('text');b.url=v('url');b.style=v('style');break;
    case 'media-gallery': {
      b.cols = parseInt(v('cols'))||2;
      const gitems=[];let gi=0;
      while(true){const ue=document.getElementById(`mf-gi-url-${gi}`);if(!ue)break;
        gitems.push({url:ue.value,caption:(document.getElementById(`mf-gi-cap-${gi}`)||{}).value||''});gi++;}
      b.items=gitems;break;
    }
    case 'step-list': {
      const sitems=[];let si=0;
      while(true){const te=document.getElementById(`mf-st-title-${si}`);if(!te)break;
        sitems.push({title:te.value,body:(document.getElementById(`mf-st-body-${si}`)||{}).value||''});si++;}
      b.items=sitems;break;
    }
    case 'callout': b.variant=v('variant');b.icon=v('icon');b.title=v('title');b.body=v('body');break;
  }
  closeModal();
  _mdLocked = false;
  render();
}

function onEditorPaste() {

  setTimeout(() => {
    const text = document.getElementById('md-out').value;
    if (!text.trim()) return;
    // Only auto-parse if content looks like it has block HTML (not just plain text typing)
    if (text.includes('<div class="wf-') || text.includes('<CaseHeader') || text.includes('<ul class="wf-')) {
      const fmM = text.match(/^---\n([\s\S]*?)\n---\n?/);
      if (fmM) S.mdConfig = fmM[1].trim();
      S.blocks = parseMDtoBlocks(text);
      _id = S.blocks.length ? Math.max(...S.blocks.map(b=>parseInt(b.id)||0)) + 1 : _id;
      document.querySelectorAll('.ttab').forEach(el=>el.classList.toggle('on',el.dataset.t===S.tmpl));
      syncForm();
      // Keep _mdLocked=true so preview renders the ORIGINAL pasted HTML
      // (all divs, spans, classes, li, h3 titles — the whole template as-is)
      _mdLocked = true;
      render();   // updates sidebar blocks list
      schedulePreview(); // preview uses rawMDtoPreviewHTML on original paste
      toast(`Parsed ${S.blocks.length} block${S.blocks.length!==1?'s':''} from paste`);
    } else {
      _mdLocked = true;
      schedulePreview();
    }
  }, 0);
}
function toggleDD(force) {
  ddOpen = force!==undefined ? force : !ddOpen;
  document.getElementById('add-dd').classList.toggle('open',ddOpen);
}
document.addEventListener('click',e=>{ if(!e.target.closest('#add-wrap')) toggleDD(false); });
document.addEventListener('keydown', e => {
  if (e.key==='Escape' && document.getElementById('ov').classList.contains('open')) { closeModal(); return; }
  if ((e.ctrlKey||e.metaKey) && !e.shiftKey && e.key==='s') { e.preventDefault(); saveFile(); return; }
  if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==='C') { e.preventDefault(); copyMD(); }
});

function rebuildDD() {
  document.getElementById('add-dd').innerHTML = (BTYPES[S.tmpl]||[]).map(t=>
    `<div class="add-opt" onclick="addBlk('${t.t}')">
      <span class="add-opt-ico">${t.i}</span><span>${t.l}</span>
    </div>`).join('');
}

// ═══════════════════════════════════════════════
// HEADER FORM
// ═══════════════════════════════════════════════
function us() {
  S.hdr.title = document.getElementById('f-title').value;
  S.hdr.badge = document.getElementById('f-badge').value;
  S.hdr.icon  = document.getElementById('f-icon').value;
  S.hdr.pid   = document.getElementById('f-pid').value;
  S.hdr.path  = document.getElementById('f-path').value;
  const sp = document.getElementById('save-path');
  if (S.hdr.pid && !sp.value) {
    const parts = S.hdr.path.split(',').slice(1).map(p=>p.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''));
    sp.placeholder = [...parts.filter(Boolean), S.hdr.pid+'.md'].join('/');
  }
  _mdLocked = false;
  render();
}

function renderTags() {
  document.getElementById('tags-row').innerHTML = S.hdr.tags.map((t,i)=>
    `<span class="tchip">${esc(t.text)}<button onclick="rmTag(${i})">×</button></span>`).join('');
}

function addTag() {
  const txt=document.getElementById('tag-txt').value.trim(), col=document.getElementById('tag-col').value;
  if (!txt) return;
  S.hdr.tags.push({text:txt,col});
  document.getElementById('tag-txt').value='';
  renderTags(); render();
}

function rmTag(i) { S.hdr.tags.splice(i,1); renderTags(); render(); }

// ═══════════════════════════════════════════════
// COPY & SAVE
// ═══════════════════════════════════════════════
function toggleBlocks() {
  const lp = document.getElementById('lp');
  const btn = document.getElementById('blocks-btn');
  lp.classList.toggle('closed');
  btn.classList.toggle('on', !lp.classList.contains('closed'));
}

function regenMD() {
  _mdLocked = false;
  document.getElementById('md-out').value = genMD();
  schedulePreview();
  toast('Regenerated from blocks');
}

function loadMD() {
  document.getElementById('load-md-file').click();
}

function handleLoadMD(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    let text = ev.target.result;
    const fmM = text.match(/^---\n([\s\S]*?)\n---\n?/);
    if (fmM) {
      S.mdConfig = fmM[1].trim();
    }
    // Parse blocks for sidebar
    S.blocks = parseMDtoBlocks(text);
    _id = S.blocks.length ? Math.max(...S.blocks.map(b=>parseInt(b.id)||0)) + 1 : _id;
    document.querySelectorAll('.ttab').forEach(el=>el.classList.toggle('on',el.dataset.t===S.tmpl));
    syncForm();
    // Put original content in editor & keep locked so preview renders it as-is
    document.getElementById('md-out').value = text;
    _mdLocked = true;
    render();
    schedulePreview();
    toast(`Loaded: ${file.name} (${S.blocks.length} block${S.blocks.length!==1?'s':''} detected)`);
    if (!document.getElementById('save-path').value) {
      document.getElementById('save-path').value = file.name;
    }
  };
  r.readAsText(file);
  e.target.value = '';
}

function copyMD() {
  navigator.clipboard.writeText(document.getElementById('md-out').value)
    .then(()=>toast('Copied to clipboard!'));
}

async function saveFile() {
  const fp = document.getElementById('save-path').value.trim();
  if (!fp) { toast('Enter a file path!',true); return; }
  const fm = S.mdConfig ? `---\n${S.mdConfig}\n---\n\n` : '';
  const body = fm + document.getElementById('md-out').value;
  try {
    const r = await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({filepath:fp,content:body})});
    const d = await r.json();
    if (d.success) toast('✅ Saved: '+d.saved);
    else toast(d.error||'Save failed',true);
  } catch(e) { toast('Error: '+e.message,true); }
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastT=null;
function toast(msg,err=false) {
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='on'+(err?' err':'');
  clearTimeout(toastT);
  toastT=setTimeout(()=>el.className='',2800);
}

// ═══════════════════════════════════════════════
// RESIZE HANDLE
// ═══════════════════════════════════════════════
(function(){
  const handle = document.getElementById('resize-handle');
  const editor = document.getElementById('editor-pane');
  const preview = document.getElementById('prev-wrap');
  let dragging = false, startX, startEW, startPW;
  handle.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX;
    startEW = editor.getBoundingClientRect().width;
    startPW = preview.getBoundingClientRect().width;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const total = startEW + startPW;
    const newEW = Math.max(200, Math.min(total - 200, startEW + dx));
    const newPW = total - newEW;
    editor.style.flex = 'none'; editor.style.width = newEW + 'px';
    preview.style.flex = 'none'; preview.style.width = newPW + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
let _fullCSS = ''; // Will be populated at init with the full style.css

async function init() {
  // Build template tabs
  document.getElementById('ttabs').innerHTML = Object.entries(TM).map(([k,m])=>
    `<button class="ttab ${k===S.tmpl?'on':''}" data-t="${k}" onclick="setTmpl('${k}')">${m.label}</button>`
  ).join('');

  // Set defaults
  document.getElementById('f-path').value = TM[S.tmpl].defPath;
  S.hdr.path = TM[S.tmpl].defPath;

  // Restore from localStorage if available
  try {
    const saved = JSON.parse(localStorage.getItem('wfgen_state')||'null');
    if (saved?.hdr) {
      Object.assign(S, saved);
      _id = S.blocks.length ? Math.max(...S.blocks.map(b=>parseInt(b.id)||0)) + 1 : _id;
      document.getElementById('hdr-status').textContent = `Restored (${S.blocks.length} block${S.blocks.length!==1?'s':''})`;    }
  } catch(e){}
  syncForm();

  // Fetch full style.css and store for inlining into preview
  try {
    const r = await fetch('/api/style');
    if (r.ok) {
      _fullCSS = await r.text();
      document.getElementById('hdr-status').textContent = 'CSS loaded ✓';
    }
  } catch(e) {
    document.getElementById('hdr-status').textContent = 'Server offline — styles may differ';
  }

  // Render after CSS is loaded so preview has full styles
  rebuildDD();
  render();
}

init();
</script>
